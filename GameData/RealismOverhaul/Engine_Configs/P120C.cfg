@PART[*]:HAS[#engineType[P120C]]:FOR[RealismOverhaulEngines]
{
    %category = Engine
    %title = P120C
    %manufacturer = Avio
    %description = The solid rocket booster for ESA's Ariane 6 and Vega-C.

    %specLevel = operational

    @MODULE[ModuleEngines*]
    {
        %EngineType = SolidBooster
        %allowShutdown = False
        %throttleLocked = True
    }

    !MODULE[ModuleFuelTanks],*{}
    !MODULE[ModuleEngineConfigs],*{}
    !RESOURCE,*{}

    @MODULE[ModuleGimbal]
    {
        %gimbalRange = 6.0
    }

    MODULE
    {
        name = ModuleFuelTanks
        type = HTPB
        volume = 81129 // 143.6t HTPB
        basemass = -1
        TANK
        {
            name = HTPB
            amount = 81129
            maxAmount = 81129
        }
    }

    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleEngines
        configuration = P120C
        origMass = 8.2

        CONFIG
        {
            name = P120C
            specLevel = operational
            minThrust = 4615
            maxThrust = 4615
            heatProduction = 100
            ullage = True
            pressureFed = False
            ignitions = 1

            PROPELLANT
            {
                name = HTPB
                ratio = 1.0
                DrawGauge = True
            }

            atmosphereCurve
            {
                key = 0 278.5
                key = 1 145.6
            }
        }
    }
}