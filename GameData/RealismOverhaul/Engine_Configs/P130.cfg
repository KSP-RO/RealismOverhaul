@PART[*]:HAS[#engineType[P120C+]]:FOR[RealismOverhaulEngines]
{
    %category = Engine
    %title = P120C+
    %manufacturer = Avio
    %description = Stretched variant of the P120C booster for Ariane 6 Block 2.

    %specLevel = operational

    @MODULE[ModuleEngines*]
    {
        %EngineType = SolidBooster
        %allowShutdown = False
        %throttleLocked = True
    }

    !MODULE[ModuleFuelTanks],*{}
    !MODULE[ModuleEngineConfigs],*{}
    !RESOURCE,*{}

    @MODULE[ModuleGimbal]
    {
        %gimbalRange = 6.0
    }

    MODULE
    {
        name = ModuleFuelTanks
        type = HTPB
        volume = 87005 // 154t HTPB
        basemass = -1
        TANK
        {
            name = HTPB
            amount = 87005
            maxAmount = 87005
        }
    }

    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleEngines
        configuration = P120C+
        origMass = 8.5

        CONFIG
        {
            name = P120C+
            specLevel = operational
            minThrust = 4800
            maxThrust = 4800
            heatProduction = 100
            ullage = True
            pressureFed = False
            ignitions = 1

            PROPELLANT
            {
                name = HTPB
                ratio = 1.0
                DrawGauge = True
            }

            atmosphereCurve
            {
                key = 0 279.5
                key = 1 146
            }
        }
    }
}