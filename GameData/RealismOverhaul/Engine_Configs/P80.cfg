@PART[*]:HAS[#engineType[P80]]:FOR[RealismOverhaulEngines]
{
    %category = Engine
    %title = Vega P80
    %manufacturer = Avio
    %description = Solid rocket motor used as the first stage of the Vega launch vehicle.

    %specLevel = operational

    @MODULE[ModuleEngines*]
    {
        %EngineType = SolidBooster
        %allowShutdown = False
        %throttleLocked = True
    }

    !MODULE[ModuleFuelTanks],*{}
    !MODULE[ModuleEngineConfigs],*{}
    !RESOURCE,*{}

    @MODULE[ModuleGimbal]
    {
        %gimbalRange = 6.0
        %useGimbalResponseSpeed = True
        %gimbalResponseSpeed = 16
    }

    MODULE
    {
        name = ModuleFuelTanks
        type = HTPB
        volume = 49717 // 88t HTPB
        basemass = -1
        TANK
        {
            name = HTPB
            amount = 49717
            maxAmount = 49717
        }
    }

    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleEngines
        configuration = P80
        origMass = 7.33

        CONFIG
        {
            name = P80
            specLevel = operational
            minThrust = 3015
            maxThrust = 3015
            heatProduction = 20
            ullage = True
            pressureFed = False
            ignitions = 1

            PROPELLANT
            {
                name = HTPB
                ratio = 1.0
                DrawGauge = True
            }

            atmosphereCurve
            {
                key = 0 280
                key = 1 250
            }
        }
    }
}