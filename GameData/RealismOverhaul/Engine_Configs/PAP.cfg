//	===============================================================
//	Ariane 4 PAP (Propulseur d'Appoint à Poudre / P9.5)
//	Dimensions: 12.20 x 1.07 m

//
//	Thrust (SL): 629.6 kN
//	Thrust (Vac): 690 kN
//	Isp (SL): 240 s
//	Isp (Vac): 263 s
//	Burn Time: 29 s
//	Gross Mass: 12,560 kg
//	Dry Mass: 3,060 kg
//	Propellant: HTPB composite (HTPB/AP/Al)
//	Propellant Mass: 9,500 kg
//
//	SOURCES:
//	Encyclopedia Astronautica - Ariane 4-0 P9.5 SPB:
//	  http://www.astronautix.com/a/ariane4-0p95spb.html
//	Braeunig Space Launchers - Ariane:
//	  http://www.braeunig.us/space/specs/ariane.htm
//	Wikipedia - Ariane 4:
//	  https://en.wikipedia.org/wiki/Ariane_4
//	GlobalSecurity - Ariane 4:
//	  https://www.globalsecurity.org/space/world/europe/ariane4.htm
//
//	===============================================================

@PART[*]:HAS[#engineType[PAP]]:FOR[RealismOverhaulEngines]
{
	%category = Engine
	%title = Ariane 4 PAP
	%manufacturer = #roMfrAerospatiale
	%description = The PAP (Propulseur d'Appoint à Poudre) was the solid strap-on booster used on the Ariane 42P, 44P, and 44LP launch vehicles. Developed and manufactured by the Italian firm SNIA/BPD, the steel-cased motor burned HTPB composite propellant and provided a significant thrust augmentation during the critical liftoff phase. 142 motors flew without a propulsion-related failure between 1988 and 2003. Burn time 29 s.

	@tags ^= :$: france europe ariane 4 snia bpd pap p9.5 solid booster htpb strap-on

	%specLevel = operational

	@MODULE[ModuleEngines*]
	{
		%EngineType = SolidBooster
		%allowShutdown = False
		%throttleLocked = True
		%exhaustDamage = True
	}

	!MODULE[ModuleAlternator],*{}
	!MODULE[ModuleGimbal] {}
	!RESOURCE,*{}

	//	Propellant volume: 9500 kg HTPB at ~1766 kg/m^3 bulk density ≈ 5379 L
	//	Using HTPB tank type (same as Castor-4A, EAP-241)
	MODULE
	{
		name = ModuleFuelTanks
		volume = 5379
		type = HTPB
		basemass = -1
		TANK
		{
			name = HTPB
			amount = 5379
			maxAmount = 5379
		}
	}

	!MODULE[ModuleEngineConfigs],*{}

	MODULE
	{
		name = ModuleEngineConfigs
		type = ModuleEngines
		configuration = PAP
		modded = false
		origMass = 3.06

		CONFIG
		{
			name = PAP
			specLevel = operational
			minThrust = 690.0
			maxThrust = 690.0
			heatProduction = 100

			PROPELLANT
			{
				name = HTPB
				ratio = 1.0
				DrawGauge = True
			}

			atmosphereCurve
			{
				key = 0 263
				key = 1 240
			}

			curveResource = HTPB

			chamberNominalTemp = 1650
			maxEngineTemp = 2000

			//	Thrust curve modeled on Castor
			thrustCurve
			{
				key = 1.00000 1.00000  2.50000  0.00000
				key = 0.98500 0.96000  1.20000  2.60000
				key = 0.97000 0.93000  0.40000  1.20000
				key = 0.95000 0.92000 -0.10000  0.40000
				key = 0.90000 0.92500 -0.08000 -0.08000
				key = 0.80000 0.93000 -0.05000 -0.06000
				key = 0.70000 0.93500 -0.04000 -0.04000
				key = 0.60000 0.94000 -0.03000 -0.03000
				key = 0.50000 0.95000 -0.04000 -0.04000
				key = 0.40000 0.96000 -0.05000 -0.05000
				key = 0.30000 0.97000 -0.06000 -0.06000
				key = 0.20000 0.98000 -0.10000 -0.08000
				key = 0.15000 0.98500  0.00000 -0.12000
				key = 0.13000 0.98200  1.00000  0.00000
				key = 0.10000 0.95000  5.00000  1.20000
				key = 0.07000 0.80000  8.50000  6.00000
				key = 0.04000 0.55000 12.00000 10.00000
				key = 0.02000 0.28000 15.00000 13.00000
				key = 0.00500 0.08000  8.00000 16.00000
				key = 0.00000 0.01000  0.00000 20.00000
			}

			//	142 PAP motors flew on Ariane 42P/44P/44LP with no reported faailures
			TESTFLIGHT:NEEDS[TestLite|TestFlight]
			{
				ratedBurnTime = 30
				ignitionReliabilityStart = 0.999
				ignitionReliabilityEnd = 1.0
				cycleReliabilityStart = 0.985714
				cycleReliabilityEnd = 0.999014
				reliabilityDataRateMultiplier = 2
				isSolid = True
			}
		}
	}
}