@PART[*]:HAS[#engineType[ArianePAP]]:FOR[RealismOverhaulEngines]
{
    %category = Engine
    %title = Ariane PAP
    %manufacturer = BPD Difesa e Spazio
    %description = Propulseur d'Appoint à Poudre (PAP). Solid strap-on booster for Ariane 4.

    %specLevel = operational

    @MODULE[ModuleEngines*]
    {
        %EngineType = SolidBooster
        %allowShutdown = False
        %throttleLocked = True
    }

    !MODULE[ModuleFuelTanks],*{}
    !MODULE[ModuleEngineConfigs],*{}
    !RESOURCE,*{}

    MODULE
    {
        name = ModuleFuelTanks
        type = HTPB
        volume = 5367 // 9.5t HTPB
        basemass = -1
        TANK
        {
            name = HTPB
            amount = 5367
            maxAmount = 5367
        }
    }

    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleEngines
        configuration = ArianePAP
        origMass = 1.5

        CONFIG
        {
            name = ArianePAP
            specLevel = operational
            minThrust = 650
            maxThrust = 650
            heatProduction = 20
            ullage = True
            pressureFed = False
            ignitions = 1

            PROPELLANT
            {
                name = HTPB
                ratio = 1.0
                DrawGauge = True
            }

            atmosphereCurve
            {
                key = 0 260
                key = 1 230
            }
        }
    }
}