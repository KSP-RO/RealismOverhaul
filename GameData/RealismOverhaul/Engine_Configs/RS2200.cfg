		{
			name = RS-2200
			specLevel = concept
			minThrust = 903.0
			maxThrust = 4515.0
			heatProduction = 100
			massMult = 1.05

			PROPELLANT
			{
				name = LqdHydrogen
				ratio = 0.729
				DrawGauge = True
			}
			PROPELLANT
			{
				name = LqdOxygen
				ratio = 0.271
			}
			atmosphereCurve
			{
				key = 0 455
				key = 1 345
			}
		}
