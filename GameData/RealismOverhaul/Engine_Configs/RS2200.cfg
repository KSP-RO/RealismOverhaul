@PART[*]:HAS[#engineType[RS2200]]:FOR[RealismOverhaulEngines]
{
	@title = RS-2200	//RS-2200
	%manufacturer = #roMfrRocketdyne
	@description = Represents 1.75 RS-2200 powerheads. Placing four yields the 7-engine VentureStar array. = #roXRS2200Desc	//A linear aerospike engine developed for NASA's X-33 sub-scale SSTO technology demonstrator. Like the toroidal J-2T engines, the XRS-2200 used machinery derived from the J-2S.

