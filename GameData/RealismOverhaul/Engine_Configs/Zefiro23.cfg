@PART[*]:HAS[#engineType[Zefiro23]]:FOR[RealismOverhaulEngines]
{
    %category = Engine
    %title = Vega Zefiro 23
    %manufacturer = Avio
    %description = Second stage solid rocket motor for the Vega launch vehicle.

    %specLevel = operational

    @MODULE[ModuleEngines*]
    {
        %EngineType = SolidBooster
        %allowShutdown = False
        %throttleLocked = True
    }

    !MODULE[ModuleFuelTanks],*{}
    !MODULE[ModuleEngineConfigs],*{}
    !RESOURCE,*{}

    @MODULE[ModuleGimbal]
    {
        %gimbalRange = 6.0
    }

    MODULE
    {
        name = ModuleFuelTanks
        type = HTPB
        volume = 13559 // 24t HTPB
        basemass = -1
        TANK
        {
            name = HTPB
            amount = 13559
            maxAmount = 13559
        }
    }

    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleEngines
        configuration = Zefiro23
        origMass = 1.95

        CONFIG
        {
            name = Zefiro23
            specLevel = operational
            minThrust = 1120
            maxThrust = 1120
            heatProduction = 20
            ullage = True
            pressureFed = False
            ignitions = 1

            PROPELLANT
            {
                name = HTPB
                ratio = 1.0
                DrawGauge = True
            }

            atmosphereCurve
            {
                key = 0 287.5
                key = 1 240
            }
        }
    }
}