@PART[*]:HAS[#engineType[Zefiro40]]:FOR[RealismOverhaulEngines]
{
    %category = Engine
    %title = Vega-C Zefiro 40
    %manufacturer = Avio
    %description = Upgraded second stage for the Vega-C launch vehicle.

    %specLevel = operational

    @MODULE[ModuleEngines*]
    {
        %EngineType = SolidBooster
        %allowShutdown = False
        %throttleLocked = True
    }

    !MODULE[ModuleFuelTanks],*{}
    !MODULE[ModuleEngineConfigs],*{}
    !RESOURCE,*{}

    @MODULE[ModuleGimbal]
    {
        %gimbalRange = 6.0
    }

    MODULE
    {
        name = ModuleFuelTanks
        type = HTPB
        volume = 20451 // 36.2t HTPB
        basemass = -1
        TANK
        {
            name = HTPB
            amount = 20451
            maxAmount = 20451
        }
    }

    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleEngines
        configuration = Zefiro40
        origMass = 3.1

        CONFIG
        {
            name = Zefiro40
            specLevel = operational
            minThrust = 1304
            maxThrust = 1304
            heatProduction = 20
            ullage = True
            pressureFed = False
            ignitions = 1

            PROPELLANT
            {
                name = HTPB
                ratio = 1.0
                DrawGauge = True
            }

            atmosphereCurve
            {
                key = 0 293.5
                key = 1 245
            }
        }
    }
}