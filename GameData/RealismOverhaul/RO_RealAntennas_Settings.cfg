@RealAntennasCommNetParams:FOR[RealismOverhaul]
{
    %minRelayTL = 2
    @TargetingMode[Vessel] { %techLevel = 2 }
    @TargetingMode[BodyCenter] { %techLevel = 0 }
    @TargetingMode[BodyLatLonAlt] { %techLevel = 3 }
    @TargetingMode[AzEl] { %techLevel = 0 }
    @TargetingMode[OrbitRelative] { %techLevel = 2 }

    !BandInfo,* {}
    BandInfo
    {
        name = VHF
        TechLevel = 0
        Frequency = 150e6
        ChannelWidth = 12.5e3
    }
    BandInfo
    {
        name = UHF
        TechLevel = 0
        Frequency = 430e6
        ChannelWidth = 31.5e3
    }
    BandInfo
    {
        name = S
        TechLevel = 3
        Frequency = 2.25e9
        ChannelWidth = 0.330e6
    }
    BandInfo
    {
        name = X
        TechLevel = 7
        Frequency = 8.45e9
        ChannelWidth = 1.36e6
    }
    BandInfo
    {
        name = Ku
        TechLevel = 8
        Frequency = 14.3e9
        ChannelWidth = 20e6
    }
    BandInfo
    {
        name = Ka
        TechLevel = 9
        Frequency = 32.0e9
        ChannelWidth = 20e6
    }
}

@RealAntennasCommNetParams:FOR[RealismOverhaul]
{
    !EncoderInfo,* {}
    EncoderInfo
    {
        name = Analog FSK
        TechLevel = 0
        CodingRate = 0.001
        RequiredEbN0 = 10
    }
    EncoderInfo
    {
        name = None
        TechLevel = 2
        CodingRate = 1
        RequiredEbN0 = 10
    }
//    EncoderInfo
//    {
//        name = Reed-Muller 32/6/16 [RM(1,5)]
//        TechLevel = 3
//        CodingRate = 0.25     // s/b 6/32 = 0.1875
//        RequiredEbN0 = 5.5
//    }
// https://www.researchgate.net/figure/Code-rates-of-Reed-Muller-code-RM-1-m-and-corresponding-SIR-requirement-for-target_tbl2_1959018
// +1.4dB to go from BER 1e-3 to 1e-5
    EncoderInfo
    {
        name = Reed-Muller 1,3
        TechLevel = 3
        CodingRate = 0.5
        RequiredEbN0 = 6.5
    }
    EncoderInfo
    {
        name = Reed-Solomon 255/223
        TechLevel = 5
        CodingRate = 0.8745
        RequiredEbN0 = 6.1
    }
    EncoderInfo
    {
        name = Convolutional 7, 1/2
        TechLevel = 6
        CodingRate = 0.5
        RequiredEbN0 = 4.5
    }
//  EncoderInfo
//    {
//        name = Convolutional 7, 7/8
//        reference = http://www.ieee802.org/16/tg1/phy/contrib/802161pc-00_33.pdf
//        TechLevel = 100
//        CodingRate = 0.875
//        RequiredEbN0 = 6.5
//    }
    EncoderInfo
    {
        name = Concatenated Reed-Solomon,Convolutional
        reference = http://www.ieee802.org/16/tg1/phy/contrib/802161pc-00_33.pdf
        TechLevel = 7
        CodingRate = 0.43725
        RequiredEbN0 = 3.3
    }
    EncoderInfo
    {
        name = Turbo 1/2
        TechLevel = 8
        CodingRate = 0.5
        RequiredEbN0 = 1
    }
}

