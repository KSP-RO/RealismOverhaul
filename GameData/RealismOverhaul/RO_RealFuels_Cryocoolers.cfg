// Cryocooler tech progression for RealFuels tanks.
//
// COP = (T_cold / (T_hot - T_cold)) * cryoCoolerEfficiency.Evaluate(T_cold)
// Coefficient of Performance, ratio of the useful cooling provided to the work (energy) required.
//
// The default curve is calibrated to published flight cryocooler data:
//   - 4 K class (He / lab):      ~1% of Carnot
//   - 20 K class (LH2):          ~5-15% of Carnot (NICMOS ≈ 6%, modern RBC ≈ 10-15%)
//   - 77-90 K class (LN2/LOX):   ~20-30% of Carnot (Sunpower CryoTel ≈ 24%, NASA RBC ≈ 30%)
//   - 150+ K (mild refrigeration): ~40-50% of Carnot
//
// Mass: coolerBaseMass = 0.050 t (50 kg) fixed overhead: electronics, housing, mounting
//       coolerMassPerKWInput = curve (t/kW), keyed to T_cold (K)
//         Captures the hardware-complexity penalty of multi-stage coolers:
//           250 K → 0.010 t/kW  (warm refrigeration, trivial single-stage)
//           150 K → 0.015 t/kW  (easy single-stage)
//            90 K → 0.020 t/kW  (reference: modern Stirling/PT flight hardware)
//            65 K → 0.025 t/kW  (pushing single-stage limits)
//            40 K → 0.030 t/kW  (two-stage often required)
//            20 K → 0.060 t/kW  (two-stage, LH2 class)
//             4 K → 0.120 t/kW  (three-stage He JT+PT, JWST MIRI class)
// Cost: coolerBaseCost = 150 funds ($150k 1965) fixed per-unit overhead
//       coolerCostPerKWInput = curve (funds/kW), same temperature shape as mass
//         Reference at 90 K: 1500 funds/kW ($1.5M/kW 1965)
//       1 fund = $1,000 (1965 USD)
//
// kW input |      kg |      funds | reference
// ---------+---------+------------+-------------------------------------------
//    0.055 |     9.5 |          ? | Ball SB230 (mid 1990s, ~65K)
//     0.08 |     1.3 |         ~5 | Sunpower CryoTel GT (commercial, 2020s, 40K)
//     0.15 |    10.5 |       ~250 | Ball SB235 (space-qualified, mid 2000s, ~65K)
//     0.24 |     ~55 |     ~1,800 | NICMOS NCS (mission-qualified, late 1990s, ~77K)
//    0.255 |    14.4 |          ? | Ball SB235E (mid 2000s, ~65K)
//    0.475 |    ~400 |          ? | JWST MIRI Cryocooler (NGAS, 4K-class He JT + PT, ~2011)

// Cryocooler tech tiers mapped to RP-1 materialsScience nodes:
//   TL1 (LOX/LN2/LCH4, 65-250 K):  materialsScienceLongTerm         (1986-1997) - first long-life Stirling/PT space coolers (Oxford/ISAMS, flew 1991)
//   TL2 (+ LH2, 20 K):             materialsScienceInternational    (1998-2008) - LH2 zero-boil-off cooler research era
//   TL3 (+ LHe, 4 K):              materialsScienceMatureCommercial (2019-2028) - multi-stage He JT+PT, JWST MIRI class

@PART:HAS[#roAddCryocooler[?rue]]:AFTER[RealismOverhaulTankTypes]
{
	@MODULE[ModuleFuelTanks]
	{
		// No cryocoolers available initially
		%maxCoolerInputKW = 0	// This will disable the feature
		%coolerBaseMass = 0
		%coolerBaseCost = 0
		!coolerMassPerKWInput = DEL
		!coolerCostPerKWInput = DEL
		!cryoCoolerEfficiency = DEL

		%UPGRADES
		{
			UPGRADE
			{
				name__ = RFTech-Cryocooler-TL1
				description__ = You can now use cryocoolers
				maxCoolerInputKW = 0.1
				coolerBaseMass = 0.05
				coolerBaseCost = 500
				coolerMassPerKWInput
				{
					key = 4 0
					key = 20 0
					key = 40 0
					key = 65 0.025
					key = 90 0.020
					key = 150 0.015
					key = 250 0.010
				}
				coolerCostPerKWInput
				{
					key = 4 0
					key = 20 0
					key = 40 0
					key = 65 1875
					key = 90 1500
					key = 150 1125
					key = 250 750
				}
				cryoCoolerEfficiency
				{
					key = 0 0
					key = 4 0
					key = 20 0
					key = 65 0.05
					key = 90 0.1
					key = 150 0.20
					key = 250 0.25
				}
			}
			
			UPGRADE
			{
				name__ = RFTech-Cryocooler-TL2
				description__ = You can now use TL2 cryocoolers (adds LH2 / 20 K class cooling)
				maxCoolerInputKW = 0.5
				coolerBaseMass = 0.025
				coolerBaseCost = 250
				coolerMassPerKWInput
				{
					key = 4 0
					key = 20 0.060
					key = 40 0.030
					key = 65 0.025
					key = 90 0.020
					key = 150 0.015
					key = 250 0.010
				}
				coolerCostPerKWInput
				{
					key = 4 0
					key = 20 4500
					key = 40 2250
					key = 65 1875
					key = 90 1500
					key = 150 1125
					key = 250 750
				}
				cryoCoolerEfficiency
				{
					key = 0 0
					key = 4 0			// no helium-class cooling yet, see TL3
					key = 20 0.08
					key = 65 0.20
					key = 90 0.25
					key = 150 0.40
					key = 250 0.50
				}
			}

			UPGRADE
			{
				name__ = RFTech-Cryocooler-TL3
				description__ = You can now use TL3 cryocoolers (adds LHe / 4 K class cooling)
				maxCoolerInputKW = 5
				coolerBaseMass = 0.01
				coolerBaseCost = 125
				coolerMassPerKWInput
				{
					key = 4 0.120
					key = 20 0.060
					key = 40 0.030
					key = 65 0.025
					key = 90 0.020
					key = 150 0.015
					key = 250 0.010
				}
				coolerCostPerKWInput
				{
					key = 4 9000
					key = 20 4500
					key = 40 2250
					key = 65 1875
					key = 90 1500
					key = 150 1125
					key = 250 750
				}
				cryoCoolerEfficiency
				{
					key = 0 0
					key = 4 0.01
					key = 20 0.10
					key = 65 0.25
					key = 90 0.30
					key = 150 0.45
					key = 250 0.50
				}
			}
		}
	}
}


// cleanup
@PART:HAS[#roTankType]:FOR[zzzTagCleanup]
{
	!roAddCryocooler = delete
}

PARTUPGRADE
{
	name = RFTech-Cryocooler-TL1
	partIcon = RO-RFTank-Separate
	techRequired = materialsScienceLongTerm
	entryCost = 0
	cost = 0
	title = Cryocoolers TL1
	basicInfo = You can now use TL1 cryocoolers on fuel tanks
	manufacturer = Generic
	description = Basic long-life Stirling/pulse-tube cryocoolers, capable of cooling LOX, LN2, and LCH4 class propellants (65-250 K). First demonstrated in space by the Oxford Stirling cooler aboard ISAMS/UARS in 1991.
}


PARTUPGRADE
{
	name = RFTech-Cryocooler-TL2
	partIcon = RO-RFTank-Separate
	techRequired = materialsScienceInternational
	entryCost = 0
	cost = 0
	title = Cryocoolers TL2
	basicInfo = You can now use TL2 cryocoolers on fuel tanks
	manufacturer = Generic
	description = Improved multi-stage cryocoolers that add liquid hydrogen (20 K) class cooling and raise the efficiency of the warmer regimes. Reflects the late-1990s/2000s push toward zero-boil-off LH2 propellant storage.
}


PARTUPGRADE
{
	name = RFTech-Cryocooler-TL3
	partIcon = RO-RFTank-Separate
	techRequired = materialsScienceMatureCommercial
	entryCost = 0
	cost = 0
	title = Cryocoolers TL3
	basicInfo = You can now use TL3 cryocoolers on fuel tanks
	manufacturer = Generic
	description = State-of-the-art three-stage helium JT + pulse-tube cryocoolers, capable of reaching 4 K for liquid helium storage. Represents JWST MIRI-class flight hardware of the 2010s-2020s.
}
