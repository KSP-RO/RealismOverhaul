// Buran Orbiter Construction Kit
// Disclaimer: Most of this is a copy of DECQs Buran mod
@PART[benjee10_shuttle*|benjee10_buran*|benjee10_Buran*]:FOR[RealismOverhaul]
{
	@manufacturer = NPO Energia
}
// Orbiter configs
@PART[benjee10_shuttle_buranCockpit]:FOR[RealismOverhaul]
{
	@title = 1K Orbiter Forward Fuselage
	%RSSROConfig = True
	
	@rescaleFactor = 1.81
	@mass = 8.556
	
	@maxTemp = 773
	%skinMaxTemp = 2000
	%heatConductivity = 0.01		//all conductivity
	%skinInternalConductionMult = 0.005	//skin-to-int conductivity
	%skinSkinConductionMult = 0.1
	%emissiveConstant = 0.95		//matte black

	!RESOURCE[MonoPropellant]{}
	!MODULE[ModuleReactionWheel]{}
	!MODULE[ModuleLiftingSurface]{}
	
	@MODULE[ModuleCommand]
	{
		RESOURCE
		{
			//Assuming same as STS
			// https://www.buran-energia.com/documentation/documentation-akc-power-unit.php
			name = ElectricCharge
			rate = 14 //Average power draw of orbiter
		}
	}

	// https://science.ksc.nasa.gov/shuttle/technology/sts-newsref/sts-rcs.html
	// https://spaceflight.nasa.gov/shuttle/reference/shutref/orbiter/rcs/overview.html
	// https://www.alternatewars.com/BBOW/Space_Engines/Shuttle_Propulsion_1990.pdf
	// https://www.smashwords.com/extreader/read/126031/3/americas-space-shuttle-reaction-control-system-nasa-astronaut-training-manual-rcs-2102a
	// 418.6 kg MMH (475.76 L) and 664 kg (461.1 L) NTO RCS propellant
	// RCS ISP taken from https://www.researchgate.net/profile/Btc-Zandbergen/publication/267047129_Modern_Liquid_Propellant_Rocket_Engines_2000_Outlook/links/5444b3dc0cf2a76a3ccd7b48/Modern-Liquid-Propellant-Rocket-Engines-2000-Outlook.pdf
	// Primary RCS thrust : 3.87 kN (870 lbf)
	// RCS patch at the bottom of the file

	// https://www.bernd-leitenberger.de/space-shuttle.shtml
	// three nickel-cadmium batteries with 10 amperehours each at 28 volts, so in total 3024 kJ
	MODULE
	{
		name = ModuleFuelTanks
		volume = 4000
		type = ServiceModule
		basemass = -1
		TANK
		{
			name = Syntin
			amount = 307.7
			maxAmount = 307.7
		}
		TANK
		{
			name = LqdOxygen
			amount = 647.3
			maxAmount = 647.3
		}
		TANK
		{
			name = ElectricCharge
			amount = 3024
			maxAmount = 3024
		}
	}
}

// Cockpit internal configuration
@INTERNAL[OV_shuttleIVA]:FOR[RealismOverhaul]
{
	%scaleAll = 1.78, 1.78, 1.78

	@MODULE[InternalSeat],*
	{
		%kerbalScale = 1.78, 1.78, 1.78
		%kerbalOffset = 0.0, 0.0, 0.0
		%kerbalEyeOffset = 0.0, 0.0, 0.0
	}
}

@PART[benjee10_Buran_midFuselage]:FOR[RealismOverhaul]
{
	@title = 1K Orbiter Mid Fuselage
	%RSSROConfig = True
	
	@rescaleFactor = 1.81
	%CoMOffset = 0.0, 4.4, 0.0
	%CoLOffset = 0,-4.7,0
	@mass = 17.806
	
	@maxTemp = 773
	%skinMaxTemp = 2000
	%heatConductivity = 0.01		//all conductivity
	%skinInternalConductionMult = 0.005	//skin-to-int conductivity
	%skinSkinConductionMult = 0.1
	%emissiveConstant = 0.95		//matte black

	%rescaleCube = true

	@DRAG_CUBE
	{
		%rescaleX = 1.81
		%rescaleY = 1.81
		%rescaleZ = 1.81
	}

	!MODULE[ModuleResourceConverter]{}
	!RESOURCE[*],* {}
	%fuelCrossFeed = True

	@MODULE[ModuleLiftingSurface]
	{
		%deflectionLiftCoeff = 20.0
		%dragAtMaxAoA = 0.1
	}

	//maximum heat rejection capacity of 29,000 Btu per hour (8.5 kW)
	//https://spaceflight.nasa.gov/shuttle/reference/shutref/orbiter/eclss/atcs.html
	//values are copied from stock radiators, since I don't know what they are for
	MODULE
	{
		name = ModuleActiveRadiator
		maxEnergyTransfer = 8.5
		overcoolFactor = 0.25
		isCoreRadiator = true
		parentCoolingOnly = true
		RESOURCE
		{
			name = ElectricCharge
			rate = 0.9
		}
	}

	//https://www.bernd-leitenberger.de/space-shuttle.shtml
	// 3 Hydrogen tanks with 42 kg (593.2 L) each, and 3 Oxygen tanks with 354 kg (310.2 L) each.
	// These tanks also provide Oxygen and Hydrogen to life support. (51 kg)
	MODULE
	{
		name = ModuleFuelTanks
		volume = 2710.3
		type = ServiceModule
		basemass = -1
		TANK
		{
			name = Hydrogen
			amount = 1779.6
			maxAmount = 1779.6
		}
		TANK
		{
			name = Oxygen
			amount = 930.7
			maxAmount = 930.7
		}
	}
}

@PART[benjee10_shuttle_buranOMS]:FOR[RealismOverhaul]
{
	@title = 1K Orbiter OMS
	%RSSROConfig = True
	
	@rescaleFactor = 1.81
	%CoMOffset = 0.0, 0.5, 0.0
	@mass = 15.7
	
	@maxTemp = 773
	%skinMaxTemp = 2000
	%heatConductivity = 0.01		//all conductivity
	%skinInternalConductionMult = 0.005	//skin-to-int conductivity
	%skinSkinConductionMult = 0.1
	%emissiveConstant = 0.95		//matte black
	
	!RESOURCE[*],* {}
	!MODULE[ModuleReactionWheel]{}
	!NODE[node_stack_Rudder] {}	//Remove rudder node, we're making the rudder surface attach to hopefully please FAR
	
	// https://www.bernd-leitenberger.de/space-shuttle.shtml
	// three fuel cells
	// 7kW sustained load, and 0.6 l water per kWh
	MODULE
	{
		name = ModuleResourceConverter
		ConverterName = Fuel Cell #1
		StartActionName = Start Fuel Cell #1
		StopActionName = Stop Fuel Cell #1
		ToggleActionName = Toggle Fuel Cell #1
		FillAmount = 1
		AutoShutdown = False
		GeneratesHeat = True
		UseSpecialistBonus = False
		
		INPUT_RESOURCE
		{
			ResourceName = Hydrogen
			Ratio = 0.001719
		}

		INPUT_RESOURCE
		{
			ResourceName = Oxygen
			Ratio = 0.000855
		}

		OUTPUT_RESOURCE
		{
			ResourceName = ElectricCharge
			Ratio = 7
			DumpExcess = False
		}

		OUTPUT_RESOURCE
		{
			ResourceName = Water
			Ratio = 0.00116666666666
			DumpExcess = True
		}
	}
	
	MODULE
	{
		name = ModuleResourceConverter
		ConverterName = Fuel Cell #2
		StartActionName = Start Fuel Cell #2
		StopActionName = Stop Fuel Cell #2
		ToggleActionName = Toggle Fuel Cell #2
		FillAmount = 1
		AutoShutdown = False
		GeneratesHeat = True
		UseSpecialistBonus = False
		
		INPUT_RESOURCE
		{
			ResourceName = Hydrogen
			Ratio = 0.001719
		}

		INPUT_RESOURCE
		{
			ResourceName = Oxygen
			Ratio = 0.000855
		}

		OUTPUT_RESOURCE
		{
			ResourceName = ElectricCharge
			Ratio = 7
			DumpExcess = False
		}

		OUTPUT_RESOURCE
		{
			ResourceName = Water
			Ratio = 0.00116666666666
			DumpExcess = True
		}
	}
	
	MODULE
	{
		name = ModuleResourceConverter
		ConverterName = Fuel Cell #3
		StartActionName = Start Fuel Cell #3
		StopActionName = Stop Fuel Cell #3
		ToggleActionName = Toggle Fuel Cell #3
		FillAmount = 1
		AutoShutdown = False
		GeneratesHeat = True
		UseSpecialistBonus = False
		
		INPUT_RESOURCE
		{
			ResourceName = Hydrogen
			Ratio = 0.001719
		}

		INPUT_RESOURCE
		{
			ResourceName = Oxygen
			Ratio = 0.000855
		}

		OUTPUT_RESOURCE
		{
			ResourceName = ElectricCharge
			Ratio = 7
			DumpExcess = False
		}

		OUTPUT_RESOURCE
		{
			ResourceName = Water
			Ratio = 0.00116666666666
			DumpExcess = True
		}
	}

	//should have three APU's for launch/entry power and hydraulics,
	//and three hydrazine tanks for them, each with 145.9 liters of hydrazine
	// configured with 188.3 liters
	//https://spaceflight.nasa.gov/shuttle/reference/shutref/orbiter/apu/
	MODULE
	{
		name = ModuleResourceConverter
		ConverterName = Auxiliary Power Unit
		StartActionName = Start APU
		StopActionName = Stop APU
		ToggleActionName = Toggle APU
		FillAmount = 1
		AutoShutdown = False
		GeneratesHeat = True
		UseSpecialistBonus = False

		INPUT_RESOURCE
		{
			ResourceName = Hydrazine
			Ratio = 0.21
		}

		OUTPUT_RESOURCE
		{
			ResourceName = ElectricCharge
			Ratio = 15
			DumpExcess = False
		}
	}

	//OMS
	// https://science.ksc.nasa.gov/shuttle/technology/sts-newsref/sts-rcs.html
	// https://en.wikipedia.org/wiki/Space_Shuttle_Orbital_Maneuvering_System
	// https://www.alternatewars.com/BBOW/Space_Engines/Shuttle_Propulsion_1990.pdf
	// https://www.smashwords.com/extreader/read/126031/3/americas-space-shuttle-reaction-control-system-nasa-astronaut-training-manual-rcs-2102a
	// RCS ISP taken from https://www.researchgate.net/profile/Btc-Zandbergen/publication/267047129_Modern_Liquid_Propellant_Rocket_Engines_2000_Outlook/links/5444b3dc0cf2a76a3ccd7b48/Modern-Liquid-Propellant-Rocket-Engines-2000-Outlook.pdf
	// 2214.432 kg (2516.4 L) MMH and 3707.136 kg (2574.4 L) NTO OMS propellant (per pod)
	// 418.6 kg MMH (475.76 L) and 664 kg (461.1 L) NTO RCS propellant (per pod)
	// Primary RCS thrust : 3.87 kN (870 lbf)
	// RCS patch at the bottom of the file
	MODULE
	{
		name = ModuleFuelTanks
		volume = 13430.8
		type = ServiceModule
		basemass = -1
		TANK
		{
			name = Syntin
			amount = 4154.3
			maxAmount = 4154.3
		}
		TANK
		{
			name = LqdOxygen
			amount = 8738.7
			maxAmount = 8738.7
		}
		//backup batteries in aft compartment. Assumed same capacity as primary batteries
		TANK
		{
			name = ElectricCharge
			amount = 3024
			maxAmount = 3024
		}
	}
}

