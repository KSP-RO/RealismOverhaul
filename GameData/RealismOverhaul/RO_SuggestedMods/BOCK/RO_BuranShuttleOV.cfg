//OMS
// Change RCS on both forward and aft fuselage
@PART[benjee10_shuttle_buranCockpit|benjee10_shuttle_buranOMS]:FOR[RealismOverhaul]
{
	@MODULE[ModuleRCSFX],*
	{
		!resourceName = DELETE
		@thrusterPower = 3.92
		PROPELLANT
		{
			name = Syntin
			ratio = 0.3222
		}
		PROPELLANT
		{
			name = LqdOxygen
			ratio = 0.6778
		}
		@atmosphereCurve
		{
			@key,0 = 0 295
			@key,1 = 1 150	//Guess
		}
	}
}