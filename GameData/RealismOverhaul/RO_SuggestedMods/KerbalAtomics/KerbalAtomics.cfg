+PART[ntr-sc-125-2]:FOR[RealismOverhaul]
{
	@name = RO-KA-LRCNTR
	%engineType =  LRCLNTR
	
	@MODEL,0
	{
		@scale = 1.0,1.0,1.0
	}
	%rescaleFactor = 3.0
}
@PART[ntr-gc-25-2]:FOR[RealismOverhaul]
{
    %RSSROConfig = True
    
    !MODULE[ModuleEngineConfigs] {}

    // %rescaleFactor = 1.6 // Uncomment if scaling from 2.5m to ~4m standard  
    @mass = 12.5
    @maxTemp = 3600
    
    @MODULE[ModuleEngines*]
    {
        @minThrust = 150
        @maxThrust = 450
        @heatProduction = 250
        
        @PROPELLANT[LiquidFuel]
        {
            @name = lqdHydrogen
            @ratio = 1.0
        }
        !PROPELLANT[Oxidizer] {}
        
        @atmosphereCurve
        {
            @key,0 = 0 2700
            @key,1 = 1 1100
        }
    }
    
    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleEngines
        configuration = GasCoreNTR-25
        origMass = 12.5
        
        CONFIG
        {
            name = GasCoreNTR-25
            minThrust = 150
            maxThrust = 450
            heatProduction = 250
            
            PROPELLANT
            {
                name = lqdHydrogen
                ratio = 1.0
                DrawGauge = True
            }
            
            atmosphereCurve
            {
                key = 0 2700
                key = 1 1100
            }
        }
    }
}


