// -----------------------------------------------------------
// Falcon Legs
// -----------------------------------------------------------

@PART[KRE-FalconLeg-S]:FOR[RealismOverhaul]
{
    %RSSROConfig = True
    @rescaleFactor *= 1.464

    @title = Falcon Landing Leg (Small)
    @manufacturer = SpaceX
    @description = Small Falcon 9 Landing Leg
    @mass = 0.15
    @maxTemp = 1500
    @skinMaxTemp = 2000
    @crashTolerance = 20
    @breakingForce = 250
    @breakingTorque = 250
}

@PART[KRE-FalconLeg-M]:FOR[RealismOverhaul]
{
    %RSSROConfig = True
    @rescaleFactor *= 1.464

    @title = Falcon 9 Landing Leg
    @manufacturer = SpaceX
    @description = Standard Falcon 9 Landing Leg
    @mass = 0.60 // Block 5 leg set weighs ~2.4 tons, so scaled to each leg 
    @maxTemp = 1500
    @skinMaxTemp = 2400
    @crashTolerance = 40
    @breakingForce = 500
    @breakingTorque = 500
}

@PART[KRE-FalconLeg-L]:FOR[RealismOverhaul]
{
    %RSSROConfig = True
    @rescaleFactor *= 1.464

    @title = Falcon Landing Leg (Large)
    @manufacturer = SpaceX
    @description = Large Falcon 9 Landing Leg
    @mass = 1.20
    @maxTemp = 1500
    @skinMaxTemp = 2400
    @crashTolerance = 50
    @breakingForce = 800
    @breakingTorque = 800
}