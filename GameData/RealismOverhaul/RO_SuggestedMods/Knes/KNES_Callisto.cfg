@PART[_Knes_French_Hermes]:LAST[RealAntennas] // nuke the dBi it assigns 
{
    @MODULE[ModuleRealAntenna],0
    {
        %referenceGain = 1.5
        !antennaDiameter = DELETE
    }
}



@PART[_Knes_French_Hermes_Wings]:NEEDS[FerramAerospaceResearch]:AFTER[RealismOverhaul]
{
    @maximum_drag = 0
    @minimum_drag = 0
    @angularDrag = 0
    @dragCoeff = 0
    @deflectionLiftCoeff = 0

    !MODULE[ModuleLiftingSurface] {}

    MODULE
    {
        name = FARWingAerodynamicModel
        b_2 = 3.0843
        MAC = 5.3817
        TaperRatio = 0.1341
        MidChordSweep = 59.35
        sweepOffset = 7.0821
        rootChord = 8.1788
    }
}

@PART[_Knes_French_Hermes_Rudder]:NEEDS[FerramAerospaceResearch]:AFTER[RealismOverhaul]
{
    @maximum_drag = 0
    @minimum_drag = 0
    @angularDrag = 0
    @dragCoeff = 0
    @deflectionLiftCoeff = 0
    @ctrlRotationalExtents = 0,0,0

    !MODULE[ModuleLiftingSurface] {}

    @MODULE[ModuleControlSurface]
    {
        @name = FARControllableSurface
        %b_2 = 3.1094
        %MAC = 1.6250
        %TaperRatio = 0.446
        %MidChordSweep = 49.32
        %sweepOffset = 2.1769
        %rootChord = 3.2441
        %ctrlSurfFrac = 0.35
        %nonSideAttach = 0
        %maxdeflect = 30
    }
}

@PART[_Knes_French_Hermes_Elevon]:NEEDS[FerramAerospaceResearch]:AFTER[RealismOverhaul]
{
    @maximum_drag = 0
    @minimum_drag = 0
    @angularDrag = 0
    @dragCoeff = 0
    @deflectionLiftCoeff = 0
    @ctrlRotationalExtents = 0,0,0

    !MODULE[ModuleLiftingSurface] {}

    // These parameters do NOT match the model, but it is impossible for them to work *if* they did. Hence, I've buffed them far beyond what is reasonable for gameplay's sake.
    @MODULE[ModuleControlSurface]
    {
        @name = FARControllableSurface
        %b_2 = 3.85
        %MAC = 1.55
        %TaperRatio = 1.0
        %MidChordSweep = 0
        %sweepOffset = 0
        %rootChord = 1.55
        %ctrlSurfFrac = 1.0
        %nonSideAttach = 1
        %maxdeflect = 28
    }
}