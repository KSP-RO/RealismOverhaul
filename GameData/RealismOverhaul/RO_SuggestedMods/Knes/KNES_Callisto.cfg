@PART[_Knes_French_Hermes]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.5
    @title = Callisto
    @manufacturer = Aérospatiale / Dassault-Breguet
    
    @description = The original version of the Hermes spaceplane as developed by CNES. To distinguish it from the larger ESA version, it is referred to as Callisto.

    @mass = 8.5
    @CrewCapacity = 3

    %ROLSTankStorage = 30

    %skinTempTag = HRSI
    %internalTempTag = Instruments
    %skinTempOverride = 2000
    %paintEmissivityTag = 0.95

    !MODULE[ModuleReactionWheel] {}

    @RESOURCE[ElectricCharge]
    {
        @amount = 12500
        @maxAmount = 12500
    }
    !RESOURCE[MonoPropellant] {}

    @MODULE[ModuleCommand]
    {
        @minimumCrew = 0
        RESOURCE
        {
            name = ElectricCharge
            rate = 1.5 // kW
        }
    }

    @MODULE[ModuleRCS*]
    {
        @name = ModuleRCSFX
        @thrusterPower = 0.400 
        @stagingEnabled = True
        
        !resourceName = DELETE
        !PROPELLANT[*],* {}

        PROPELLANT
        {
            name = MMH
            ratio = 0.4943
        }
        PROPELLANT
        {
            name = MON3
            ratio = 0.5057
        }
        PROPELLANT
        {
            name = Helium
            ratio = 12.9
            ignoreForIsp = true
        }
        
        !atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 340
            key = 1 110
        }
    }

    !MODULE[ModuleResourceConverter] {}

    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 2500
        basemass = -1

        TANK
        {
            name = MMH
            amount = 180
            maxAmount = 180
        }
        TANK
        {
            name = MON3
            amount = 184
            maxAmount = 184
        }
        TANK
        {
            name = Helium
            amount = 4500
            maxAmount = 4500
        }
        TANK
        {
            name = LqdHydrogen
            amount = 414.96
            maxAmount = 414.96
        }
        TANK
        {
            name = LqdOxygen
            amount = 21.73
            maxAmount = 21.73
        }
        TANK
        {
            name = ElectricCharge
            amount = 846.8
            maxAmount = 846.8
        }
    }

    MODULE
    {
        name = ModuleRealAntenna
        antennaDiameter = 1.0
    }
}

@PART[_French_Hermes_OME_Engine]:FOR[RealismOverhaul]
{   
    %RSSROConfig = True
    @rescaleFactor = 1.5
    @title = Callisto OME Thruster
    @description = Callisto's Orbital Maneuvering Engine
    @manufacturer = DASA
    @mass = 0.115

    %skinTempTag = Niobium
    %internalTempTag = HotStructure

    @MODULE[ModuleEngines*]
    {
        @minThrust = 27.5
        @maxThrust = 27.5
        @heatProduction = 100
        %EngineType = LiquidFuel
        
        !PROPELLANT[*],* {}
        
        PROPELLANT
        {
            name = MMH
            ratio = 0.4943
            DrawGauge = True
        }
        PROPELLANT
        {
            name = MON3
            ratio = 0.5057
        }
        PROPELLANT
        {
            name = Helium
            ratio = 11.25
            ignoreForIsp = True
        }
        
        !atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 324
            key = 1 150
        }
    }
}

