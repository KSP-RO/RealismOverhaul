@PART[Knes_MonoProp_Engine_3]:FOR[RealismOverhaul]
{
	%RSSROConfig = true
	@rescaleFactor = 1.44
	%specLevel = speculative
	@title = Hermès Main Thruster
	@manufacturer = Aérospatiale
	@description = Small thruster for Hermès spaceplane for manoeuvering in space. Attach in pair.

	@mass = 0.05
	%skinTempTag = Niobium
	%internalTempTag = HotStructure

	@MODULE[ModuleEnginesFX]
	{
		@EngineType = LiquidFuel
	}

	MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleEngines
        configuration = Hermes_Thruster
        origMass = 0.05

        CONFIG
        {
            name = Hermes_Thruster
            minThrust = 4
            maxThrust = 20
            heatProduction = 15
            massMult = 1.0
            ullage = True
            pressureFed = True
            ignitions = 200

            PROPELLANT
            {
                name = MMH
                ratio = 0.4943
            }
            PROPELLANT
            {
                name = MON3
                ratio = 0.5057
            }
            PROPELLANT
            {
                name = Helium
                ratio = 12.9
                ignoreForIsp = True
            }
            atmosphereCurve
            {
                key = 0 340
                key = 1 110
                key = 6 0.001
            }
        }
    }

	!RESOURCE[MonoPropellant] {}
}

@PART[Knes_Hermes]:LAST[RealAntennas] // nuke the dBi it assigns 
{
    @MODULE[ModuleRealAntenna],0
    {
        %referenceGain = 1.5
        !antennaDiameter = DELETE
    }
}

