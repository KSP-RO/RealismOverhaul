@PART[Knes_Hermes]:FOR[RealismOverhaul]
{
	%RSSROConfig = true
	@rescaleFactor = 1.44
	%specLevel = speculative	
	@title = Hermès Body
	@manufacturer = Aérospatiale
	@description = Hermès was a crewed spaceplane concept by ESA in the 1980s/90s. It took several notes from Space Shuttle, although the payload capacity was much lower than the US counterpart. It was to be launched on Ariane 5, hence the human-rating of the launch vehicle.	
	//Using the 1988 design of Hermès ASH + MRH + propellants	
	@mass = 14.025 //http://www.capcomespace.net/dossiers/espace_europeen/hermes/1988.htm	
	@CrewCapacity = 3	
	%ROLSTankStorage = 30

	%skinTempTag = HRSI
	%internalTempTag = Instruments
	%skinTempOverride = 2000
	%paintEmissivityTag = 0.95

	!MODULE[ModuleReactionWheel] {}	
	@MODULE[ModuleCommand]
	{
		@minimumCrew = 0
		RESOURCE
		{
			name = ElectricCharge
			rate = 1.5 // kW
		}
	}	
	@RESOURCE[ElectricCharge]
	{
		@amount = 12500
		@maxAmount = 12500
	}
	!RESOURCE[MonoPropellant] {}	
	@MODULE[ModuleRCSFX]
	{
		@thrusterPower = 0.600 //2x600N + 1x25N thrusters per axis https://books.google.co.in/books?id=vLadDQAAQBAJ&pg=PA280&lpg=PA280&dq=20kN+thruster+Hermès&source=bl&ots=FAMh2V6C-C&sig=ACfU3U1o1T52RzKTQfcDSqg7PSIg6hIrRg&hl=en&sa=X&ved=2ahUKEwjetv6u5JX0AhX69nMBHQ3xD-MQ6AF6BAgXEAM#v=onepage&q=20kN%20thruster%20Hermès&f=false
		!resourceName = NULL
		@stagingEnabled = True	
		PROPELLANT
		{
			name = MMH
			ratio = 0.4943
		}
		PROPELLANT
		{
			name = MON3
			ratio = 0.5057
		}
		PROPELLANT
		{
			name = Helium
			ratio = 12.9
			ignoreForIsp = true
		}
		@atmosphereCurve
		{
			@key,0 = 0 340
			@key,1 = 1 110
		}
	}	
	!MODULE[ModuleResourceConverter] {}	
	MODULE
	{
		name = ModuleFuelTanks
		type = ServiceModule
		volume = 3500 //150kg storable propellant + 29.4kg Hydrogen + 24.8kg Oxygen (taken as 70% of Space Shuttle H 2and O2 storage without any base) + additional storage
		basemass = -1	
		TANK
		{
			name = MMH
			amount = 33.3032
			maxAmount = 33.3032
		}
		TANK
		{
			name = MON3
			amount = 32.277
			maxAmount = 32.277
		}
		TANK
		{
			name = Helium
			amount = 846.02
			maxAmount = 846.02
		}
		TANK
		{
			name = Hydrogen
			amount = 1245.72
			maxAmount = 1245.72
		}
		TANK
		{
			name = Oxygen
			amount = 651.49
			maxAmount = 651.49
		}
		TANK
		{
			name = ElectricCharge
			amount = 2117
			maxAmount = 2117
		}
	}	
	MODULE
	{
		name = ModuleRealAntenna
		antennaDiameter = 1.0
	}
}

