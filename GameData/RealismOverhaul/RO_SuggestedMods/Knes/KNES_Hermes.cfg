@PART[Knes_Hermes_HRM]:FOR[RealismOverhaul]
{
	%RSSROConfig = true
	@rescaleFactor = 1.19952
	%specLevel = speculative
	@title = Hermès HRM
	@manufacturer = Aérospatiale
	@description = Resource Module for Hermès Spaceplane. Removed after 1991 design change. Contains proulsion system, radiators and docking and airlock system.

	@mass = 4.7
	%skinTempTag = MLI
	%internalTempTag = Instruments
	
	!RESOURCE[MonoPropellant] {}

	MODULE
	{
		name = ModuleFuelTanks
		type = ServiceModule
		volume = 655.802 //1500kg storable propellant
		basemass = -1

		TANK
		{
			name = MMH
			amount = 333.032
			maxAmount = 330.032
		}
		TANK
		{
			name = MON3
			amount = 322.77
			maxAmount = 322.77
		}
		TANK
		{
			name = Helium
			amount = 8460.2
			maxAmount = 8460.2
		}
	}

	MODULE
	{
		name = ModuleActiveRadiator
		maxEnergyTransfer = 6250
		overcoolFactor = 0.2
		isCoreRadiator = true
		parentCoolingOnly = true
		RESOURCE
		{
			name = ElectricCharge
			rate = 0.5
		}
	}

	!MODULE[ModuleReactionWheel] {}

	@MODULE[ModuleRCSFX]
	{
		@thrusterPower = 1.6
		@stagingEnabled = True
		!resourceName = NULL

		PROPELLANT
		{
			name = MMH
			ratio = 0.4943
		}
		PROPELLANT
		{
			name = MON3
			ratio = 0.5057
		}
		PROPELLANT
		{
			name = Helium
			ratio = 12.9
			ignoreForIsp = true
		}

		@atmosphereCurve
		{
			@key,0 = 0 340
			@key,1 = 1 110
		}
	}
}
@PART[Knes_Hermes_HRM]:FOR[RealismOverhaul]:NEEDS[RealAntennas]
{
	!MODULE[ModuleDataTransmitter] {}
	%MODULE[ModuleRealAntenna] { %antennaDiameter = 0.75 }
}

