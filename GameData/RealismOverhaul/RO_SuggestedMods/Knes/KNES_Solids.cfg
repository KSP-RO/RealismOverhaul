// I konw this one works, at least
@PART[Knes_Booster_EAP]:FOR[RealismOverhaul]
{
    %RSSROConfig = True
    @rescaleFactor = 1.44
    %engineType = EAP-241

    @title = Ariane 5 EAP (P241)
    @manufacturer = EADS
    @description = The massive solid rocket strap-on booster used for the Ariane 5 launch vehicle.
}

