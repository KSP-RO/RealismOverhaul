//https://en.wikipedia.org/wiki/Kliper

@PART[Knes_Command_K-CEV]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.44
    %specLevel = speculative    
    @title = Kliper Spacecraft
    @manufacturer = RSC Energia
    @description = Proposed replacement for the Soyuz capsule. Kliper utilized a lifting body design to reduce re-entry G-loads and support a crew of six. 
    @mass = 11.8
    @CrewCapacity = 6
    %ROLSTankStorage = 30

    %skinTempTag = HRSI
    %internalTempTag = Instruments
    %skinTempOverride = 2000
    %paintEmissivityTag = 0.95

    @MODULE[ModuleCommand]
    {
        @minimumCrew = 0
        RESOURCE
        {
            name = ElectricCharge
            rate = 1.5 // kW
        }
    }   

    !RESOURCE[MonoPropellant] {}    
    @MODULE[ModuleRCSFX]
    {
        @thrusterPower = 0.600 
        !resourceName = NULL
        @stagingEnabled = True  
        PROPELLANT
        {
            name = UDMH
            ratio = 0.478
        }
        PROPELLANT
        {
            name = NTO
            ratio = 0.522
        }
        PROPELLANT
        {
            name = Helium
            ratio = 12.9
            ignoreForIsp = true
        }
        @atmosphereCurve
        {
            @key,0 = 0 315
            @key,1 = 1 110
        }
    }   
    !MODULE[ModuleResourceConverter] {} 
    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 3500 
        basemass = -1   
        
        TANK
        {
            name = UDMH
            amount = 812
            maxAmount = 812
        }
        TANK
        {
            name = NTO
            amount = 887
            maxAmount = 887
        }
        TANK
        {
            name = Helium
            amount = 17000
            maxAmount = 17000
        }
        TANK
        {
            name = LqdHydrogen
            amount = 218
            maxAmount = 218
        }
        TANK
        {
            name = LqdOxygen
            amount = 108
            maxAmount = 108
        }
        TANK
        {
            name = Nitrogen
            amount = 261
            maxAmount = 261
        }
        TANK
        {
            name = ElectricCharge
            amount = 12500
            maxAmount = 12500
        }
    }   
    MODULE
    {
        name = ModuleRealAntenna
        antennaDiameter = 1.0
    }
}

@PART[_Knes_Skid]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.44
    %specLevel = speculative
    @title = Kliper Landing Skid
    @manufacturer = RSC Energia
    @description = Retractable landing skid for the Kliper spacecraft.
    @mass = 0.08

    %skinTempTag = HRSI
    %internalTempTag = Instruments
    %skinTempOverride = 2000
    %paintEmissivityTag = 0.95
    @maxTemp = 1500
}

@PART[Knes_IXV_Elevon]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.44
    %specLevel = speculative
    @title = Kliper Elevon
    @manufacturer = RSC Energia
    @description = Aerodynamic control surface for the Kliper spacecraft.
    @mass = 0.12
    
    %skinTempTag = HRSI
    %internalTempTag = Aluminum
    %skinTempOverride = 2000
    %paintEmissivityTag = 0.95
    @maxTemp = 1500

    @MODULE[ModuleControlSurface]
    {
        @dragCoeff = 0.4
        @deflectionLiftCoeff = 0.35 
        @actuatorSpeed = 40
    }
}

@PART[_Knes_Utility_Adapter_09375_0625]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.44
    %specLevel = speculative
    @title = Kliper Service Module
    @manufacturer = RSC Energia
    @description = Service module adapter and OMS engine for the Kliper spacecraft.
    @mass = 0.25

    %skinTempTag = Aluminum
    %internalTempTag = Instruments
    
    !RESOURCE[MonoPropellant] {}
    !RESOURCE[ElectricCharge] {}
    
    @MODULE[ModuleEngines*]
    {
        @minThrust = 15
        @maxThrust = 15
        @heatProduction = 25
        @EngineType = LiquidFuel
        %ullage = False
        %pressureFed = True
        %ignitions = 50

        !PROPELLANT[MonoPropellant] {}
        PROPELLANT
        {
            name = UDMH
            ratio = 0.478
            DrawGauge = True
        }
        PROPELLANT
        {
            name = NTO
            ratio = 0.522
        }
        @atmosphereCurve
        {
            @key,0 = 0 315
            @key,1 = 1 110
        }
    }

    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleEngines
        configuration = Kliper-OMS
        origMass = 0.25

        CONFIG
        {
            name = Kliper-OMS
            specLevel = speculative
            minThrust = 15
            maxThrust = 15
            heatProduction = 25
            ullage = False
            pressureFed = True
            ignitions = 50

            PROPELLANT
            {
                name = UDMH
                ratio = 0.478
                DrawGauge = True
            }
            PROPELLANT
            {
                name = NTO
                ratio = 0.522
            }
            atmosphereCurve
            {
                key = 0 315
                key = 1 110
            }
        }
    }
}