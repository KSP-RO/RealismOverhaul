@PART[Knes_Crew_Pod_09375]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    %specLevel = speculative
    @title = Viking Crew Capsule
    @description = The European Crew Rescue Vehicle 'Viking' was proposed in the mid 1990s to return crew from the ISS. Scaled to a single-crew Mercury-class footprint.
    @manufacturer = Aérospatiale, Alenia Spazio & Deutsche Aerospace

    %CrewCapacity = 1
    @rescaleFactor = 2.016
    @mass = 0.85

    @maxTemp = 900
    @skinMaxTemp = 2000

    @MODULE[ModuleCommand]
    {
        @minimumCrew = 0
        RESOURCE
        {
            name = ElectricCharge
            rate = 0.6 // Reduced draw for single-crew instrumentation
        }
    }

    !RESOURCE[Ablator]{}
    !MODULE[ModuleAblator]{}

    MODULE
    {
        name = ModuleAblator
        ablativeResource = Ablator
        lossExp = -7500
        lossConst = 0.1
        pyrolysisLossFactor = 6000
        reentryConductivity = 0.01
        ablationTempThresh = 500
    }

    RESOURCE
    {
        name = Ablator
        amount = 120
        maxAmount = 120
    }

    !RESOURCE,* {}

    MODULE
    {
        name = ModuleFuelTanks
        volume = 200 // Reduced for 1.89m scale limits
        type = Fuselage
        basemass = -1
        
        TANK
        {
            name = ElectricCharge
            amount = 30000
            maxAmount = 30000
        }
        TANK
        {
            name = MMH
            amount = 12.35
            maxAmount = 12.35
        }
        TANK
        {
            name = MON3
            amount = 12.65
            maxAmount = 12.65
        }
        TANK
        {
            name = Helium
            amount = 280
            maxAmount = 280
        }
        TANK
        {
            name = Oxygen
            amount = 1000
            maxAmount = 1000
        }
        TANK
        {
            name = Food
            amount = 6.0
            maxAmount = 6.0
        }
        TANK
        {
            name = Water
            amount = 4.0
            maxAmount = 4.0
        }
        TANK
        {
            name = CarbonDioxide
            amount = 0
            maxAmount = 256
        }
        TANK
        {
            name = Waste
            amount = 0
            maxAmount = 4.15
        }
        TANK
        {
            name = WasteWater
            amount = 0
            maxAmount = 7.40
        }
        TANK
        {
            name = LithiumHydroxide
            amount = 1.0
            maxAmount = 1.0
        }
    }
}

