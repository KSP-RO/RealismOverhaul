@PART[Knes_Parachute_Inline_0625]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @title = Viking Capsule Parachute
    @rescaleFactor = 2.016
    @mass = 0.06
    @maxTemp = 900
    @skinMaxTemp = 2000

    !MODULE[ModuleParachute],* {}
    !MODULE[ModuleDragModifier],* {}

    MODULE
    {
        name = RealChuteModule
        caseMass = 0.06
        timer = 0
        mustGoDown = false
        reverseOrientation = true
        spareChutes = 1
        cutSpeed = 0.5
        
        PARACHUTE
        {
            material = Nylon
            preDeployedDiameter = 3.5
            deployedDiameter = 22.0
            minIsPressure = false
            minDeployment = 3000
            deploymentAlt = 1000
            cutAlt = -1
            preDeploymentSpeed = 2
            deploymentSpeed = 6
            preDeploymentAnimation = semiDeploySmall
            deploymentAnimation = fullyDeploySmall
            parachuteName = canopy
            capName = cap
        }
    }
}

@PART[Knes_Service_Module_Viking_09375]:FOR[RealismOverhaul]
