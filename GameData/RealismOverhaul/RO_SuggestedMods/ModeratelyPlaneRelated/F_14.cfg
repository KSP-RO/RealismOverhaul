@PART[MPR_Cockpit_F14]:FOR[RealismOverhaul]
{
    %RSSROConfig = True
    @title = F-14 Tomcat Cockpit
    @manufacturer = Grumman
    @description = Twin-seat, variable-sweep naval fighter cockpit.
    
    @mass = 1.2 // 2 NACES + canopy + avionics
    @crashTolerance = 10
    @breakingForce = 2000
    @breakingTorque = 2000
    
    %skinTempTag = Aluminum
    %internalTempTag = Instruments
    
    @MODULE[ModuleCommand]
    {
        RESOURCE
        {
            name = ElectricCharge
            rate = 1.75
        }
    }
    !RESOURCE[ElectricCharge] {}
    !MODULE[ModuleReactionWheel] {}
    
    MODULE
    {
        name = ModuleFuelTanks
        type = Fuselage
        basemass = -1
        volume = 240
        TANK
        {
            name = ElectricCharge
            amount = 21600
            maxAmount = 21600
        }
        UNMANAGED_RESOURCE
        {
            name = Oxygen
            amount = 100
            maxAmount = 100
        }
        TANK
        {
            name = Water
            amount = 4
            maxAmount = 4
        }
        TANK
        {
            name = Food
            amount = 2
            maxAmount = 2
        }
    }
    MODULE
    {
        name = ModuleSAS
    }
    MODULE
    {
        name = ModuleKrEjectPilot
        MODULE
        {
            name = ModuleKrKerbalParachute
            deployedDrag = 100
            minAirPressureToOpen = 0.01
            semiDeployedFraction = 0.0025
            semiDeployedHeight = 1.25
            deployTime = 0.33
        }
    }
}