@PART[SAE_Cockpit_F15]:FOR[RealismOverhaul]
{
    %RSSROConfig = True
    @title = F-15C/E Eagle Cockpit
    @manufacturer = McDonnell Douglas
    @description = High-performance air superiority fighter cockpit.
    %rescaleFactor = 1.43 

    @mass = 1 // ACES (160kg) + 90kg canopy + structural stuff, pretty difficult to estimate. 1 ton is a conservative estimate IMO
    @crashTolerance = 10
    @breakingForce = 2000
    @breakingTorque = 2000
    
    %skinTempTag = Aluminum
    %internalTempTag = Instruments
    
    @MODULE[ModuleCommand]
    {
        RESOURCE
        {
            name = ElectricCharge
            rate = 1.5
        }
    }
    !RESOURCE[ElectricCharge] {}
    !MODULE[ModuleReactionWheel] {}
    
    MODULE
    {
        name = ModuleFuelTanks
        type = Fuselage
        basemass = -1
        volume = 150
        TANK
        {
            name = ElectricCharge
            amount = 14400
            maxAmount = 14400
        }
        UNMANAGED_RESOURCE
        {
            name = Oxygen
            amount = 65
            maxAmount = 65
        }
        TANK
        {
            name = Water
            amount = 3
            maxAmount = 3
        }
        TANK
        {
            name = Food
            amount = 1.5
            maxAmount = 1.5
        }
    }
    MODULE
    {
        name = ModuleSAS
    }
    MODULE
    {
        name = ModuleKrEjectPilot
        MODULE
        {
            name = ModuleKrKerbalParachute
            deployedDrag = 100
            minAirPressureToOpen = 0.01
            semiDeployedFraction = 0.0025
            semiDeployedHeight = 1.25
            deployTime = 0.33
        }
    }
}