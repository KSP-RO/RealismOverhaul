// What a funky website: [1] https://web.eng.fiu.edu/allstar/f22raptor.html 
@PART[SAE_Cockpit_F22T]:FOR[RealismOverhaul]
{
    %RSSROConfig = True
    @title = F-22 Raptor Cockpit
    @manufacturer = Lockheed Martin
    @description = Single-seat, all-weather stealth tactical fighter cockpit.
    %rescaleFactor = 1.43

    @mass = 0.95 // See [1] - forward is 770 kg, canopy is 160kg, with 200kg ontop for an ejection seat
    @crashTolerance = 10
    @breakingForce = 2000
    @breakingTorque = 2000
    
    %skinTempTag = Aluminum
    %internalTempTag = Instruments
    
    @MODULE[ModuleCommand]
    {
        RESOURCE
        {
            name = ElectricCharge
            rate = 1.5
        }
    }
    !RESOURCE[ElectricCharge] {}
    !MODULE[ModuleReactionWheel] {}
    
    MODULE
    {
        name = ModuleFuelTanks
        type = Fuselage
        basemass = -1
        volume = 120
        TANK
        {
            name = ElectricCharge
            amount = 10800
            maxAmount = 10800
        }
        UNMANAGED_RESOURCE
        {
            name = Oxygen
            amount = 50
            maxAmount = 50
        }
        TANK
        {
            name = Water
            amount = 2
            maxAmount = 2
        }
        TANK
        {
            name = Food
            amount = 1
            maxAmount = 1
        }
    }
    MODULE
    {
        name = ModuleSAS
    }
    MODULE
    {
        name = ModuleKrEjectPilot
        MODULE
        {
            name = ModuleKrKerbalParachute
            deployedDrag = 100
            minAirPressureToOpen = 0.01
            semiDeployedFraction = 0.0025
            semiDeployedHeight = 1.25
            deployTime = 0.33
        }
    }
}