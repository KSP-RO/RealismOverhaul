// F-4 Phantom II Cockpit
@PART[MPR_Cockpit_F4]:FOR[RealismOverhaul]
{
    %RSSROConfig = True
    @title = F-4 Phantom II Cockpit
    @manufacturer = McDonnell Douglas
    @description = Twin seat, supersonic cockpit.
    %rescaleFactor = 1.2 

    @mass = 1.0 // 2x 200kg ejection + AWG-10 (300kg) + LS + structure, rounded up 
    @crashTolerance = 8
    @breakingForce = 2000
    @breakingTorque = 2000
    
    %skinTempTag = Aluminum
    %internalTempTag = Instruments
    
    @MODULE[ModuleCommand]
    {
        RESOURCE
        {
            name = ElectricCharge
            rate = 1.25 // Larger avionics & radar
        }
    }
    !RESOURCE[ElectricCharge] {}
    
    MODULE
    {
        name = ModuleFuelTanks
        type = Fuselage
        basemass = -1
        volume = 120
        TANK
        {
            name = ElectricCharge
            amount = 21600
            maxAmount = 21600
        }
        UNMANAGED_RESOURCE
        {
            name = Oxygen
            amount = 100
            maxAmount = 100
        }
        TANK
        {
            name = Water
            amount = 4
            maxAmount = 4
        }
        TANK
        {
            name = Food
            amount = 2
            maxAmount = 2
        }
    }
    MODULE
    {
        name = ModuleSAS
    }
    MODULE
    {
        name = ModuleKrEjectPilot
        MODULE
        {
            name = ModuleKrKerbalParachute
            deployedDrag = 100
            minAirPressureToOpen = 0.01
            semiDeployedFraction = 0.0025
            semiDeployedHeight = 1.25
            deployTime = 0.33
        }
    }
}