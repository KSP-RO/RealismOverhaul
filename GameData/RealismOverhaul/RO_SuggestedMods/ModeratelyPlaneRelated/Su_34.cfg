@PART[MPR_Cockpit_Su34]:FOR[RealismOverhaul]
{
    %RSSROConfig = True
    @title = Su-34 Fullback Cockpit
    @manufacturer = Sukhoi
    @description = Twin-seat side-by-side strike/bomber cockpit enclosed in a titanium armored tub.
    %rescaleFactor = 1.43

    @mass = 1.6 // Titanium -> Heavy
    @crashTolerance = 12
    @breakingForce = 2000
    @breakingTorque = 2000
    
    %skinTempTag = Aluminum
    %internalTempTag = Instruments
    
    @MODULE[ModuleCommand]
    {
        RESOURCE
        {
            name = ElectricCharge
            rate = 2.0
        }
    }
    !RESOURCE[ElectricCharge] {}
    !MODULE[ModuleReactionWheel] {}
    
    MODULE
    {
        name = ModuleFuelTanks
        type = Fuselage
        basemass = -1
        volume = 240
        TANK
        {
            name = ElectricCharge
            amount = 21600
            maxAmount = 21600
        }
        UNMANAGED_RESOURCE
        {
            name = Oxygen
            amount = 100
            maxAmount = 100
        }
        TANK
        {
            name = Water
            amount = 4
            maxAmount = 4
        }
        TANK
        {
            name = Food
            amount = 2
            maxAmount = 2
        }
    }
    MODULE
    {
        name = ModuleSAS
    }
    MODULE
    {
        name = ModuleKrEjectPilot
        MODULE
        {
            name = ModuleKrKerbalParachute
            deployedDrag = 100
            minAirPressureToOpen = 0.01
            semiDeployedFraction = 0.0025
            semiDeployedHeight = 1.25
            deployTime = 0.33
        }
    }
}