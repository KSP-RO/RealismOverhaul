+PART[MPR_Cockpit_F104]:FOR[RealismOverhaul]
{
    @name = RO_Cockpit_U2
    %RSSROConfig = True
    @title = U-2 Dragon Lady Cockpit
    @manufacturer = Lockheed
    @description = Single seat, high-altitude reconnaissance aircraft cockpit. Features a lighter airframe and expanded life support for long-duration flights.
    %rescaleFactor = 1.16

    @mass = 0.35 // Stripped down F-104
    @crashTolerance = 8
    @breakingForce = 2000
    @breakingTorque = 2000
    
    %skinTempTag = Aluminum
    %internalTempTag = Instruments
    
    @MODULE[ModuleCommand]
    {
        RESOURCE
        {
            name = ElectricCharge
            rate = 0.75
        }
    }
    !RESOURCE[ElectricCharge] {}
    
    !MODULE[ModuleFuelTanks] {}
    MODULE
    {
        name = ModuleFuelTanks
        type = Fuselage
        basemass = -1
        volume = 150 
        TANK
        {
            name = ElectricCharge
            amount = 14400
            maxAmount = 14400
        }
        UNMANAGED_RESOURCE
        {
            name = Oxygen
            amount = 80
            maxAmount = 80
        }
        TANK
        {
            name = Water
            amount = 4
            maxAmount = 4
        }
        TANK
        {
            name = Food
            amount = 2
            maxAmount = 2
        }
    }
    
    !MODULE[ModuleSAS] {}
    MODULE
    {
        name = ModuleSAS
    }
    
    !MODULE[ModuleKrEjectPilot] {}
    MODULE
    {
        name = ModuleKrEjectPilot
        MODULE
        {
            name = ModuleKrKerbalParachute
            deployedDrag = 100
            minAirPressureToOpen = 0.01
            semiDeployedFraction = 0.0025
            semiDeployedHeight = 1.25
            deployTime = 0.33
        }
    }
}