@PART[SAE_Cockpit_X-02]:FOR[RealismOverhaul]
{
    %RSSROConfig = True
    @title = FCAS Cockpit
    @manufacturer = Airbus
    @description = Single-seat future stealth fighter cockpit.
    %rescaleFactor = 1.43

    @mass = 0.85 // This isn't even a real plane
    @crashTolerance = 10
    @breakingForce = 2000
    @breakingTorque = 2000
    
    %skinTempTag = Aluminum
    %internalTempTag = Instruments
    
    @MODULE[ModuleCommand]
    {
        RESOURCE
        {
            name = ElectricCharge
            rate = 1.5
        }
    }
    !RESOURCE[ElectricCharge] {}
    !MODULE[ModuleReactionWheel] {}
    
    MODULE
    {
        name = ModuleFuelTanks
        type = Fuselage
        basemass = -1
        volume = 120
        TANK
        {
            name = ElectricCharge
            amount = 10800
            maxAmount = 10800
        }
        UNMANAGED_RESOURCE
        {
            name = Oxygen
            amount = 50
            maxAmount = 50
        }
        TANK
        {
            name = Water
            amount = 2
            maxAmount = 2
        }
        TANK
        {
            name = Food
            amount = 1
            maxAmount = 1
        }
    }
    MODULE
    {
        name = ModuleSAS
    }
    MODULE
    {
        name = ModuleKrEjectPilot
        MODULE
        {
            name = ModuleKrKerbalParachute
            deployedDrag = 100
            minAirPressureToOpen = 0.01
            semiDeployedFraction = 0.0025
            semiDeployedHeight = 1.25
            deployTime = 0.33
        }
    }
}