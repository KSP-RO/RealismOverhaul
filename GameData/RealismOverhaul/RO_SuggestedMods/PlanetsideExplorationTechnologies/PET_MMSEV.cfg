@PART[Benjee10_MMSEV_chassis]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.44
    @title = MMSEV Chassis
    @description = A rugged structural unit that provides power routing and mounting points for rover wheels.
    @manufacturer = #roMfrNASA
    @mass = 0.8
    
    %skinTempTag = Aluminum
    %internalTempTag = Instruments

    !RESOURCE[ElectricCharge] {}

    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 200
        basemass = -1

        TANK
        {
            name = ElectricCharge
            amount = 15000
            maxAmount = 15000
        }
    }
}

@PART[Benjee10_MMSEV_grapple]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.44
    @title = MMSEV Grapple Unit
    @description = An adaptable capture mechanism configurable to fit multiple module surfaces.
    @manufacturer = #roMfrNASA
    @mass = 0.15
    
    %skinTempTag = Aluminum
    %internalTempTag = Instruments
}

@PART[Benjee10_MMSEV_headlight]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.44
    @title = MMSEV Micro Spot Light
    @description = A tiny adjustable spotlight designed to provide illumination in the darkest of places.
    @manufacturer = #roMfrNASA
    @mass = 0.015
    
    %skinTempTag = Aluminum
    %internalTempTag = Instruments
}

@PART[Benjee10_MMSEV]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.44
    @title = Multi-Mission Space Exploration Vehicle (MMSEV)
    @description = The central command hub for the Constellation exploration vehicle. Designed for deep space or planetary surface operation. Seats up to 4 Kerbals.
    @manufacturer = #roMfrNASA
    @mass = 3.8
    
    %skinTempTag = Aluminum
    %internalTempTag = Instruments

    !RESOURCE[ElectricCharge] {}
    !RESOURCE[MonoPropellant] {}

    @MODULE[ModuleReactionWheel]
    {
        @PitchTorque = 0.5
        @YawTorque = 0.5
        @RollTorque = 0.5
    }

    @MODULE[ModuleDeployableSolarPanel]
    {
        @chargeRate = 0.8
    }

    %ROLSTankStorage = 200
    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 1500
        basemass = -1

        TANK
        {
            name = ElectricCharge
            amount = 20000
            maxAmount = 20000
        }
    }
}

@PART[Benjee10_MMSEV_monopropSled]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.44
    @title = MMSEV Service Module
    @description = Attaches to the base of the MMSEV hull, providing essential RCS fuel, life support supplies, and battery capacity for extended deep space or surface operations.
    @manufacturer = #roMfrNASA
    @mass = 0.5
    
    %skinTempTag = Aluminum
    %internalTempTag = Instruments

    !RESOURCE[ElectricCharge] {}
    !RESOURCE[MonoPropellant] {}

    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 800
        basemass = -1

        TANK
        {
            name = ElectricCharge
            amount = 10000
            maxAmount = 10000
        }
        TANK
        {
            name = Hydrazine
            amount = 250
            maxAmount = 250
        }
    }
}

@PART[Benjee10_MMSEV_wheelLinear]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.44
    @title = MMSEV Linear Rover Wheel
    @description = A stack-mounted rover wheel featuring moderate suspension and steering capabilities.
    @manufacturer = #roMfrNASA
    @mass = 0.08
    
    %skinTempTag = Aluminum
    %internalTempTag = Instruments
    
    @MODULE[ModuleWheelMotor]
    {
        @RESOURCE[ElectricCharge]
        {
            @rate = 1.5
        }
    }
}

@PART[Benjee10_MMSEV_wheelMount]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.44
    @title = MMSEV Rover Wheel Actuating Mount
    @description = An articulating mounting bracket equipped with a 360-degree vertical axis actuator, allowing complex maneuvering for side-mounted rover wheels.
    @manufacturer = #roMfrNASA
    @mass = 0.15
    
    %skinTempTag = Aluminum
    %internalTempTag = Instruments

    @MODULE[ModuleRoboticRotationServo]
    {
        @RESOURCE[ElectricCharge]
        {
            @rate = 0.5
        }
    }
}