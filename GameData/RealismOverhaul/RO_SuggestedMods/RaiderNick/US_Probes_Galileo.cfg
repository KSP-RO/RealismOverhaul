@PART[galileo_hs_bot]:FOR[RealismOverhaul]
{
	%RSSROConfig = True
	@MODEL
	{
		@scale = 1.0, 1.0, 1.0
	}
	@scale = 1.0
	@mass = 0.01 //0.06-0.05 for ablator
	@node_stack_bottom = 0.0, 0.015, 0.0, 0.0, 1.0, 0.0, 1
	%maxTemp = 14000
	%skinMaxTemp = 20000
	%PhysicsSignificance = 0
	%CoMOffset = 0.0, -1.25, 0.0
	!CoPOffset = null
	!CoLOffset = null
	%thermalMassModifier = 1.0
	%crashTolerance = 120
	%breakingForce = 25000
	%breakingTorque = 25000
	%linearStrength = 25000
	%angularStrength = 25000
	%gTolerance = 400
	%manufacturer = JPL
	!MODULE[ModuleAblator] {}
	!MODULE[ModuleHeatShield] {}
	!MODULE[ModuleAeroReentry] {}
	!RESOURCE[AblativeShielding] {}
	!RESOURCE[Ablator] {}
	!DRAG_CUBE {}
	%heatShieldTag = Lunar
	%heatShieldDiameter = 1.45
	%resetHeatShieldMass = true
	%resetHeatShieldAblator = true
	%emissiveConstant = 0.6
	%skinMassPerArea = 4
	%thermalMassModifier = 1.0
	@MODULE[ModuleDecouple]
	{
	    @ejectionForce = 250
	    @explosiveNodeID = bottom
		@isOmniDecoupler = false
	    @staged = true
	}
	MODULE
	{
		name = ModuleLiftingSurface
		useInternalDragModel = False
		deflectionLiftCoeff = 0.35
		liftingSurfaceCurve = CapsuleBottom
		disableBodyLift = False
		omnidirectional = False
		perpendicularOnly = True
		transformDir = Y
		transformSign = -1
		nodeEnabled = True
		attachNodeName = bottom
	}
}

