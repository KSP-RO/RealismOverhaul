@PART[galileo_mb]:FOR[RealismOverhaul]
{
	%RSSROConfig = True
	@MODEL
	{
		@scale = 1.0, 1.0, 1.0
	}
	@scale = 1.0
	@mass = 1.245
	@maxTemp = 773.15
	%skinMaxTemp = 873.15
	%crashTolerance = 12
	%breakingForce = 250
	%breakingTorque = 250
	%manufacturer = JPL
	@MODULE[ModuleCommand]
	{
		@RESOURCE[ElectricCharge]
		{
			@rate = 0.0806
		}
	}
	%reactionWheelConfigured = true
	@MODULE[ModuleReactionWheel]
	{
		@PitchTorque = 0.05
		@YawTorque = 0.05
		@RollTorque = 0.015
		
		@RESOURCE[ElectricCharge]
		{ 
			@rate = 0.05
		}
	}
	@MODULE[ModuleDataTransmitter]
	{
		@packetResourceCost = 0.2
	}
	MODULE
	{
		name = ModuleFuelTanks
		volume = 805.72
		type = ServiceModule
		basemass = -1
		TANK
		{
			name = ElectricCharge
			amount = 8048
			maxAmount = 8048
		}
		TANK
		{
			name = MON3
			amount = 400.9897
			maxAmount = 400.9897
		}
		TANK
		{
			name = MMH
			amount = 396.6823
			maxAmount = 396.6823
		}
	}
	@MODULE[ModuleRCS*]
	{
		@name = ModuleRCSFX
		@thrusterTransformName = RCSthruster
		@thrusterPower = 0.01
		!resourceName = MonoPropellant
		%resourceFlowMode = STACK_PRIORITY_SEARCH
		%PROPELLANT
		{
			%name = MMH
			%ratio = 0.4973
		}
		PROPELLANT
		{
			%name = MON3
			%ratio = 0.5027
		}
		%atmosphereCurve
		{
			@key,0 = 0 286
			@key,1 = 1 100
		}
	}
	@MODULE[ModuleEngines*]
	{
		@minThrust = 0.4
		@maxThrust = 0.4
		@heatProduction = 50
		@PROPELLANT[LiquidFuel]
		{
			@name = MMH
			@ratio = 0.4973
			%DrawGauge = True
		}
		@PROPELLANT[Oxidizer]
		{
			@name = MON3
			@ratio = 0.5027
		}
		@atmosphereCurve
		{
			@key,0 = 0 303
			@key,1 = 1 100
		}
		%ullage = False
		%pressureFed = True
		%ignitions = -1
		!IGNITOR_RESOURCE,* {}
		IGNITOR_RESOURCE
		{
			name = ElectricCharge
			amount = 0.03
		}
	}
	MODULE
	{
		name = ModuleEngineConfigs
		type = ModuleEngines
		configuration = S400 - 1
		modded = false
		CONFIG
		{
			name = S400 - 1
			minThrust = 0.4
			maxThrust = 0.4
			heatProduction = 50
			PROPELLANT
			{
				name = MMH
				ratio = 0.4973
				DrawGauge = True
			}
			PROPELLANT
			{
				name = MON3
				ratio = 0.5027
			}
			atmosphereCurve
			{
				key = 0 303
				key = 1 100
			}
		}
	}
	@MODULE[ModuleGenerator]
	{
		@OUTPUT_RESOURCE[ElectricCharge]
		{
			@rate = 0.570
			///570W at launch
		}
	}
}

@PART[galileo_mb]:NEEDS[RemoteTech]
{
	!MODULE[ModuleDataTransmitter]
	{
	}
	MODULE
	{
		name = ModuleSPU
		IsRTCommandStation = false
	}
	MODULE
	{
		name = ModuleRTAntennaPassive
		OmniRange = 700000000
		TRANSMITTER
		{
			PacketInterval = 0.9
			PacketSize = 0.01
			PacketResourceCost = 0.02
		}
	}
}
@PART[galileo_mb]:BEFORE[RealAntennas]:NEEDS[RealAntennas]
{
	!MODULE[ModuleDataTransmitter],* {}
	MODULE
	{
		name = ModuleRealAntenna
		antennaDiameter = 1.5	//Probe relay antenna
		RFBand = S	//Default to S-band (L-band not in RA)
	}
	MODULE
	{
		name = ModuleRealAntenna
		referenceGain = 4.0		//Low-gain S-band antenna
		RFBand = S		//Default to S-band
	}
}

