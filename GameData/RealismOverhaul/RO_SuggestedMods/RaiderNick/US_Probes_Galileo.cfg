@PART[galileo_probe_hs_parachute]:FOR[RealismOverhaul]
{
	%RSSROConfig = True
	@MODEL
	{
		@scale = 1.0, 1.0, 1.0
	}
	@scale = 1.0
	@mass = 0.01
	%maxTemp = 14000
	%skinMaxTemp = 20000
	%crashTolerance = 120
	%breakingForce = 250000
	%breakingTorque = 250000
	%linearStrength = 25000
	%angularStrength = 25000
	%manufacturer = JPL
	%gTolerance = 400
	!sound_parachute_open = DELETE
	!sound_parachute_single = deploy
	!MODULE[ModuleParachute] {}
	!MODULE[ModuleDragModifier],* {}
 
    MODULE
    {
        name = RealChuteModule
        caseMass = 0.0
        timer = 0
        mustGoDown = false
        cutSpeed = 0.5
        spareChutes = 0
 
        PARACHUTE
        {
            material = Nylon
            preDeployedDiameter = 1.8
            deployedDiameter = 2
            minIsPressure = true
            minPressure = 0.01
            deploymentAlt = 400000
            cutAlt = -1
            preDeploymentSpeed = 2
            deploymentSpeed = 6
            preDeploymentAnimation = semiDeploySmall
            deploymentAnimation = fullyDeploySmall
            parachuteName = canopy
            capName = cap
        }
    }
	EFFECTS
	{
		rcpredeploy
		{
			AUDIO
			{
				channel = Ship
				clip = sound_parachute_open
				volume = 1
			}
		}

		rcdeploy
		{
			AUDIO
			{
				channel = Ship
				clip = sound_parachute_single
				volume = 1
			}
		}

		rccut
		{
			AUDIO
			{
				channel = Ship
				clip = RealChute/Sounds/sound_parachute_cut
				volume = 1
			}
		}

		rcrepack
		{
			AUDIO
			{
				channel = Ship
				clip = RealChute/Sounds/sound_parachute_repack
				volume = 1
			}
		}
	}
}

