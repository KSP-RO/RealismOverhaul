@PART[vanguard-1]:FOR[RealismOverhaul]
{
	%RSSROConfig = True
	@MODEL
	{
		@scale = 0.458, 0.458, 0.458
	}
	@scale = 0.458
	@mass = 0.00147
	%crashTolerance = 12
	%breakingForce = 250
	%breakingTorque = 250
	@maxTemp = 573.15
	%skinmaxTemp = 673.15
	@MODULE[ModuleCommand]
	{
		@RESOURCE[ElectricCharge]
		{
			@rate = 0.000015
		}
	}
	@RESOURCE[ElectricCharge]
	{
			@amount = 117
			@maxAmount = 117
	}
	@MODULE[ModuleDataTransmitter]
	{
		@packetResourceCost = 0.000001
	}
	@MODULE[ModuleDeployableSolarPanel]
	{
		@chargeRate = 0.003
	}
	SolarConfig
    {
        level = 0
		solarUseCharge = false
    }
}
@PART[rn_vanguard-1_dec]:FOR[RealismOverhaul]
{
	%RSSROConfig = True
	@MODEL
	{
		@scale = 0.458, 0.458, 0.458
	}
	@scale = 0.458
	@mass = 0.0004
	%crashTolerance = 12
	%breakingForce = 250
	%breakingTorque = 250
	@maxTemp = 573.15
	%skinmaxTemp = 673.15
	@MODULE[ModuleDecouple]
	{
		@ejectionForce = 0.05
	}
}
@PART[vanguard-1]:NEEDS[RemoteTech]
{
	!MODULE[ModuleDataTransmitter]
	{
	}
	MODULE
	{
		name = ModuleSPU
		IsRTCommandStation = false
	}
	MODULE
	{
		name = ModuleRTAntennaPassive
		OmniRange = 600000
		TRANSMITTER
		{
			PacketInterval = 0.3
			PacketSize = 0.4
			PacketResourceCost = 0
		}
	}
}

