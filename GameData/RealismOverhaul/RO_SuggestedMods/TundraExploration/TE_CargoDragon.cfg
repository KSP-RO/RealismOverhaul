// ============================================================================
// CARGO DRAGON 1 (Gigan)
// ============================================================================

@PART[TE_19_C-Dragon_Pod]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.48 // 2.5m native to 3.7m real-world diameter

    @title = Dragon 1 Cargo Capsule
    @manufacturer = SpaceX
    @description = First-generation reusable cargo spacecraft designed to ferry supplies to low Earth orbit and the ISS via CBM berthing.

    %skinMaxTemp = 2500
    %skinInternalConductionMult = 0.005
    @mass = 4.2 // ~4.2t dry mass

    
    !MODULE[ModuleB9PartSwitch]:HAS[#moduleID[TE_VolumeBias]] {}
    !MODULE[ModuleB9PartSwitch]:HAS[#moduleID[TE_Service]] {}
    !MODULE[ModuleB9PartSwitch]:HAS[#moduleID[TE_Fuel]] {}
    !MODULE[ModuleB9PartSwitch]:HAS[#moduleID[TE_Cargo]] {}

    !RESOURCE[MonoPropellant],* {}
    !RESOURCE[MonoPropellant] {}
    !RESOURCE[LiquidFuel] {}
    !RESOURCE[Oxidizer] {}
    !MODULE[ModuleEngines*] {}


    @MODULE[ModuleRCSFX],*
    {
        !resourceName = NULL
        @thrusterPower = 0.4 // 400N Draco thrusters

        PROPELLANT
        {
            name = MMH
            ratio = 0.4950
            DrawGauge = true
        }
        PROPELLANT
        {
            name = MON3
            ratio = 0.5050
            DrawGauge = False
        }
        PROPELLANT
        {
            name = Helium
            ratio = 11.25
            ignoreForIsp = True
        }

        @atmosphereCurve
        {
            @key,0 = 0 300
            @key,1 = 1 150 
        }
    }

    @RESOURCE[ElectricCharge]
    {
        @amount = 6000
        @maxAmount = 6000
    }

    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 1550 
        basemass = -1
        TANK
        {
            name = ElectricCharge
            amount = 45000
            maxAmount = 45000
        }
        TANK
        {
            name = MMH
            amount = 600
            maxAmount = 600
        }
        TANK
        {
            name = MON3
            amount = 612
            maxAmount = 612
        }
        TANK
        {
            name = Helium
            amount = 13500
            maxAmount = 13500
        }
    }

    !MODULE[ModuleDataTransmitter] {}
    %MODULE[ModuleRealAntenna] { %antennaDiameter = 0.8 }
}

@PART[TE_19_C-Dragon_Trunk]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.48

    @title = Dragon 1 Trunk
    @manufacturer = SpaceX
    @description = Unpressurized trunk for the Dragon 1 spacecraft. Houses unpressurized cargo and provides mounting points for the deployable solar arrays.

    @mass = 0.9
}

@PART[TE_19_C-Dragon_Heatshield]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.48

    @title = Dragon 1 PICA-X Heatshield
    @manufacturer = SpaceX
    
    %heatShieldDiameter = 3.7
    %heatShieldTag = Gemini
    %resetHeatShieldAblator = true
    %resetHeatShieldMass = true
}

@PART[TE_19_C-Dragon_Nosecone]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.48

    @title = Dragon 1 Nosecone
    @manufacturer = SpaceX
    @description = Aerodynamic cover for the CBM docking mechanism. Jettisoned once in orbit.

    @mass = 0.1
}

@PART[TE_19_C-Dragon_SolarPanel]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.48

    @title = Dragon 1 Deployable Solar Array
    @manufacturer = SpaceX
    @description = Deployable solar arrays for the Dragon 1 trunk.

    @mass = 0.08
}

@PART[TE_CargoV2_Panel]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.48

    @title = Dragon Deployable Solar Array (Alt)
    @manufacturer = SpaceX
    @description = Deployable solar arrays.

    @mass = 0.08
}

@PART[TE_19_C_Dragon_Decoupler]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.48

    @title = Dragon 1 Trunk Decoupler
    @manufacturer = SpaceX
    @description = Separates the Dragon capsule from its unpressurized trunk prior to reentry.

    @mass = 0.1
}

@PART[TE_19_C-Dragon_Pod]:AFTER[RealAntennas]
{
    @MODULE[ModuleRealAntenna]
    {
        @referenceGain = 1.5
        !antennaDiameter = DEL
    }
}