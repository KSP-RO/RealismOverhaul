// ============================================================================
// CREW DRAGON
// ============================================================================

// Sources:
// https://drs.faa.gov/browse/excelExternalWindow/DRSDOCID180380960220250819130214.0001?modalOpened=true 
// https://www.spacex.com/vehicles/dragon

@PART[TE_18_DRAGONV2_POD]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.6

    @title = Crew Dragon Capsule
    @manufacturer = SpaceX
    @description = Next-generation reusable crew spacecraft designed to ferry astronauts to low Earth orbit and the ISS.

    %skinMaxTemp = 2500
    %skinInternalConductionMult = 0.005
    @mass = 7.7 // ~9.5t fueled minus propellants

    %setDefaultTACLS = true
    %defaultTACLSPax = 4
    %defaultTACLSSupply = 7

    
    !MODULE[ModuleB9PartSwitch]:HAS[#moduleID[TE_VolumeBias]] {}
    !MODULE[ModuleB9PartSwitch]:HAS[#moduleID[TE_Service]] {}
    !MODULE[ModuleB9PartSwitch]:HAS[#moduleID[TE_Fuel]] {}
    !MODULE[ModuleB9PartSwitch]:HAS[#moduleID[TE_Cargo]] {}

    !RESOURCE[MonoPropellant],* {}
    !MODULE[ModuleReactionWheel] {}
    !RESOURCE[LiquidFuel] {}
    !RESOURCE[Oxidizer] {}


    @MODULE[ModuleRCSFX],*
    {
        !resourceName = NULL
        @thrusterPower = 0.4 // Draco thrusters are ~400N

        PROPELLANT
        {
            name = MMH
            ratio = 0.4950
            DrawGauge = true
        }
        PROPELLANT
        {
            name = MON3
            ratio = 0.5050
            DrawGauge = False
        }
        PROPELLANT
        {
            name = Helium
            ratio = 11.25
            ignoreForIsp = True
        }

        @atmosphereCurve
        {
            @key,0 = 0 300
            @key,1 = 1 150 
        }
    }

    @MODULE[ModuleEngines*]
    {
        @EngineType = LiquidFuel
    }

    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleEngines
        configuration = SuperDraco
        origMass = 7.7

        CONFIG
        {
            name = SuperDraco
            minThrust = 116.8 // 20% throttle capability
            maxThrust = 584   // 8x 73kN SuperDracos
            heatProduction = 80
            ullage = False
            pressureFed = True
            ignitions = 50

            IGNITOR_RESOURCE
            {
                name = ElectricCharge
                amount = 0.5
            }

            PROPELLANT
            {
                name = MMH
                ratio = 0.4950
                DrawGauge = true
            }
            PROPELLANT
            {
                name = MON3
                ratio = 0.5050
                DrawGauge = False
            }
            PROPELLANT
            {
                name = Helium
                ratio = 11.25
                ignoreForIsp = True
            }

            atmosphereCurve
            {
                key = 0 280
                key = 1 240
                key = 4 0.01
            }
        }
    }

    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 2650 
        basemass = -1

        TANK
        {
            name = ElectricCharge
            amount = 45000
            maxAmount = 45000
        }
        TANK
        {
            name = MonoPropellant
            amount = 0
            maxAmount = 0
        }
        TANK
        {
            name = MMH
            amount = 800
            maxAmount = 800
        }
        TANK
        {
            name = MON3
            amount = 816
            maxAmount = 816
        }
        TANK
        {
            name = Helium
            amount = 18000
            maxAmount = 18000
        }
    }

    !MODULE[ModuleDataTransmitter] {}
    %MODULE[ModuleRealAntenna] { %antennaDiameter = 0.8 }
}

@PART[TE_18_DRAGONV2_TRUNK]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.6 // Estimaed to be less than 1,000 kg

    @title = Crew Dragon Trunk
    @manufacturer = SpaceX
    @description = Unpressurized trunk section for the Dragon spacecraft. Features body-mounted solar arrays and aerodynamic fins for launch escape aborts.

    @mass = 0.9
}



@PART[TE_18_DRAGONV2_HEATSHIELD]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.6

    @title = Crew Dragon PICA-X Heatshield
    @manufacturer = SpaceX
    @description = PICA-X high-performance heatshield for orbital reentry.

    %heatShieldDiameter = 4.0
    %heatShieldTag = Lunar // PICA-X is rated for lunar return
    %resetHeatShieldAblator = true
    %resetHeatShieldMass = true
}

@PART[TE_CD2_POD_DROGUES]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.6
    @mass = 0.08 // estimate
    @category = Utility

    @title = Crew Dragon V2 Drogue Chutes
    @manufacturer = SpaceX
    @description = Dual drogue parachutes for the Crew Dragon spacecraft. Deployed at high altitudes to stabilize the capsule and decelerate it to a safe velocity for main canopy deployment.

    !sound_parachute_open = DEL
    !sound_parachute_single = DEL
    !buoyancyUseCubeNamed = DEL

    !MODULE[ModuleParachute],* {}
    !MODULE[ModuleDragModifier],* {}
    !MODULE[ModuleAutoCutDrogue],* {}
    
    MODULE:NEEDS[RealChute]
    {
        name = RealChuteModule
        caseMass = 0.05
        timer = 0
        mustGoDown = true
        spareChutes = 0
        cutSpeed = 0.5
        invertCanopy = true 
        reverseOrientation = false

        PARACHUTE
        {
            material = Kevlar
            preDeployedDiameter = 4
            deployedDiameter = 8
            minIsPressure = false
            minPressure = 0.01
            minDeployment = 8500
            deploymentAlt = 7000
            cutAlt = 2500
            preDeploymentSpeed = 2
            deploymentSpeed = 4
            
            preDeploymentAnimation = semiDeployLarge_1
            deploymentAnimation = fullyDeployLarge_1
            parachuteName = canopyCD2
            capName = TE_23_CD2_DROGUE_DOOR
        }
    }
}

@PART[TE_CD2_POD_MAINS]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.6
    @mass = 0.25
    @category = Utility

    @title = Crew Dragon V2 Main Chutes
    @manufacturer = SpaceX
    @description = A cluster of four massive main parachutes designed to provide a gentle, safe splashdown velocity for the Crew Dragon capsule. 

    !sound_parachute_open = DEL
    !sound_parachute_single = DEL
    !buoyancyUseCubeNamed = DEL

    !MODULE[ModuleParachute],* {}
    !MODULE[ModuleDragModifier],* {}
    !MODULE[ModuleTestSubject],* {}
    !MODULE[ModuleAutoCutDrogue],* {}
    
    MODULE:NEEDS[RealChute]
    {
        name = RealChuteModule
        caseMass = 0.15
        timer = 0
        mustGoDown = true
        spareChutes = 0
        cutSpeed = 0.25
        invertCanopy = true 
        reverseOrientation = false

        PARACHUTE
        {
            material = Nylon
            preDeployedDiameter = 10
            deployedDiameter = 35.5 
            minIsPressure = false
            minPressure = 0.02
            minDeployment = 3000
            deploymentAlt = 2000
            cutAlt = -1
            preDeploymentSpeed = 2
            deploymentSpeed = 6
            
            preDeploymentAnimation = semiDeployLarge
            deploymentAnimation = fullyDeployLarge
            parachuteName = canopyCD2
            capName = TE_23_CD2_MAIN_DOOR_MESH
        }
    }
}

@PART[TE_18_DRAGONV2_POD]:AFTER[RealAntennas]
{
    @MODULE[ModuleRealAntenna]
    {
        @referenceGain = 1.5
        !antennaDiameter = DEL
    }
}