// FAR CONFIGS

@PART[Mk33Wing]:NEEDS[FerramAerospaceResearch]:AFTER[RealismOverhaul]
{
    @maximum_drag = 0
    @minimum_drag = 0
    @angularDrag = 0
    @dragCoeff = 0
    @deflectionLiftCoeff = 0

    !MODULE[ModuleLiftingSurface] {}

    MODULE
    {
        name = FARWingAerodynamicModel
        b_2 = 12.0630
        MAC = 9.1171
        TaperRatio = 0.3160
        MidChordSweep = 51.35
        sweepOffset = 16.8585
        rootChord = 12.8100
    }
}

@PART[Mk33Tailfin]:NEEDS[FerramAerospaceResearch]:AFTER[RealismOverhaul]
{
    @maximum_drag = 0
    @minimum_drag = 0
    @angularDrag = 0
    @dragCoeff = 0
    @deflectionLiftCoeff = 0
    @ctrlRotationalExtents = 0,0,0

    !MODULE[ModuleLiftingSurface] {}

    @MODULE[ModuleControlSurface]
    {
        @name = FARControllableSurface
        %b_2 = 2.2809
        %MAC = 3.1700
        %TaperRatio = 0.3350
        %MidChordSweep = 62.58
        %sweepOffset = 5.8559
        %rootChord = 4.3863
        %ctrlSurfFrac = 0.3233
        %nonSideAttach = 0
        %maxdeflect = 20
    }
}

