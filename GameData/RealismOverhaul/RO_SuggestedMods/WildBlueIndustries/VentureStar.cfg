// VentureStar
// Assumptions:
// GLOW at 1,000,000 kg, dry mass: ~100,000 kg
// Metallic TPS
// ~1.5 rescale factor: 38.7m IRL, stock scale at 25.9m -> 1.5
//
// Dry mass breakdown (approx):
//   Cockpit:           6.5t
//   Avionics Unit:     1.2t
//   Docking Nose:      0.5t
//   Mid Fuselage Tank: 25.0t
//   Aft Fuselage Hol:  12.0t
//   Aft Fuselage:      13.0t
//   Cargo Ramp:         2.5t
//   Wings (x2):        13.0t  (6.5t each)
//   Vert. Stab. (x2):   4.0t  (2.0t each)
//   Inner Elevon (x2):  1.0t  (0.5t each)
//   Outer Elevon (x2):  1.0t  (0.5t each)
//   Aero Cover:         0.2t
//   Payload Bay:        2.0t
//   Main Gear:          1.5t
//   Nose Gear:          0.6t
//   XRS-2200 (x7):     ~9.1t  (1.3t each per engine config)
//   Total (approx):   ~93.1t  (remaining ~7t margin for misc structure/TPS)
//
// Sources:
// https://www.nasa.gov/wp-content/uploads/2023/03/sp-4220.pdf

@PART[Mk33Cockpit]:FOR[RealismOverhaul]
{
    %RSSROConfig = True
    @rescaleFactor = 1.5
    @title = VentureStar Cockpit

    @mass = 6.5

    %skinTempTag = Inconel
    %internalTempTag = Titanium
    %skinTempOverride = 2000
    %paintEmissivityTag = 0.95
    %skinMassPerArea = 4.0
    %heatConductivity = 0.01
    %skinInternalConductionMult = 0.00005 

    @CrewCapacity = 8

    %ROLSTankStorage = 80  // ~10 units per crew member

    !RESOURCE[*],* {}

    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 2000
        basemass = -1

        TANK
        {
            name = ElectricCharge
            amount = 25000
            maxAmount = 25000
        }
    }
}

@PART[Mk33ProbeCore]:FOR[RealismOverhaul]
{
    %RSSROConfig = True
    @rescaleFactor = 1.5
    @title = VentureStar Avionics Unit

    @mass = 1.2

    %skinTempTag = Inconel
    %internalTempTag = Titanium
    %skinTempOverride = 2000
    %paintEmissivityTag = 0.95
    %skinMassPerArea = 4.0
    %heatConductivity = 0.01
    %skinInternalConductionMult = 0.00005

    @MODULE[ModuleRCS*],*
    {
        @name = ModuleRCSFX
        @thrusterPower = 2.0
        !resourceName = NULL
        !PROPELLANT[*],* {}

        PROPELLANT
        {
            name = MMH
            ratio = 0.4943
        }
        PROPELLANT
        {
            name = NTO
            ratio = 0.5057
        }
        PROPELLANT
        {
            name = Helium
            ratio = 12.9
            ignoreForIsp = true
        }

        !atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 280
            key = 1 100
            key = 4 0.001
        }
    }

    !MODULE[ModuleResourceConverter] {}
    !MODULE[ModuleGenerator] {}
    !MODULE[ModuleCoreHeat] {}
    !MODULE[ModuleFuelTanks],* {}
    !RESOURCE[*],* {}

    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 800
        basemass = -1

        TANK
        {
            name = MMH
            amount = 391
            maxAmount = 391
        }
        TANK
        {
            name = NTO
            amount = 400
            maxAmount = 400
        }
        TANK
        {
            name = Helium
            amount = 8000
            maxAmount = 8000
        }
    }
}

