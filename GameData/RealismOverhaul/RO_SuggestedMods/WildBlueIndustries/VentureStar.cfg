// VentureStar
// Assumptions:
// GLOW at 1,000,000 kg, dry mass: 100,000 kg
// Metallic TPS 
// ~1.5 rescale factor? 38.7m IRL, stock scale at 25.9 -> 1.5 

// Sources
// https://www.nasa.gov/wp-content/uploads/2023/03/sp-4220.pdf 

@PART[Mk33Cockpit]:FOR[RealismOverhaul]
{
    %RSSROConfig = True
    @rescaleFactor = 1.5
    @title = VentureStar Cockpit
    
    @mass = 6.5 
    
    %skinTempTag = Inconel
    %internalTempTag = HotStructure
    %skinTempOverride = 2000
    %paintEmissivityTag = 0.95

    @CrewCapacity = 8

    %ROLSTankStorage = 80

    !RESOURCE[*],* {}

    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 2000 
        basemass = -1

        TANK
        {
            name = ElectricCharge
            amount = 25000
            maxAmount = 25000
        }
    }
}

@PART[Mk33ProbeCore]:FOR[RealismOverhaul]
{
    %RSSROConfig = True
    @rescaleFactor = 1.5
    @title = VentureStar Avionics Unit
    
    @mass = 1.2

    %skinTempTag = Inconel
    %internalTempTag = HotStructure
    %skinTempOverride = 2000
    %paintEmissivityTag = 0.95

    @MODULE[ModuleRCS*],*
    {
        @name = ModuleRCSFX
        @thrusterPower = 2.0
        !resourceName = NULL
        !PROPELLANT[*],* {}
    
        PROPELLANT
        {
            name = LqdHydrogen
            ratio = 0.729
        }
        PROPELLANT
        {
            name = LqdOxygen
            ratio = 0.271
        }
    
        !atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 380
            key = 1 100
            key = 4 0.001
        }
    }

    !RESOURCE[*],* {}
    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 800
        basemass = -1
        TANK
        {
            name = Hydrogen
            amount = 100472
            maxAmount = 100472
        }
        TANK
        {
            name = Oxygen
            amount = 35872
            maxAmount = 35872
        }
    }
}


