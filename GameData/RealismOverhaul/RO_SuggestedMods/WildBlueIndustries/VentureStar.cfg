// VentureStar
// Assumptions:
// GLOW at 1,000,000 kg, dry mass: 100,000 kg
// Metallic TPS 
// ~1.5 rescale factor? 38.7m IRL, stock scale at 25.9 -> 1.5 

// Sources
// https://www.nasa.gov/wp-content/uploads/2023/03/sp-4220.pdf 

@PART[Mk33Cockpit]:FOR[RealismOverhaul]
{
    %RSSROConfig = True
    @rescaleFactor = 1.5
    @title = VentureStar Cockpit
    
    @mass = 6.5 
    @maxTemp = 773
    %skinMaxTemp = 2000
    %heatConductivity = 0.01		//all conductivity
    %skinInternalConductionMult = 0.005	//skin-to-int conductivity
    %skinSkinConductionMult = 0.1
    %emissiveConstant = 0.95		//matte black

    @CrewCapacity = 8

    %ROLSTankStorage = 80

    !RESOURCE[*],* {}

    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 2000 
        basemass = -1

        TANK
        {
            name = ElectricCharge
            amount = 25000
            maxAmount = 25000
        }
    }
}

@PART[Mk33ProbeCore]:FOR[RealismOverhaul]
{
    %RSSROConfig = True
    @rescaleFactor = 1.5
    @title = VentureStar Avionics Unit
    
    @mass = 1.2
    @maxTemp = 773
    %skinMaxTemp = 2000
    %heatConductivity = 0.01		//all conductivity
    %skinInternalConductionMult = 0.005	//skin-to-int conductivity
    %skinSkinConductionMult = 0.1
    %emissiveConstant = 0.95		//matte black

    @MODULE[ModuleRCS*],*
    {
        @name = ModuleRCSFX
        @thrusterPower = 4.0
        !resourceName = NULL
        !PROPELLANT[*],* {}

        PROPELLANT
        {
            name = MMH
            ratio = 0.4943
        }
        PROPELLANT
        {
            name = MON3
            ratio = 0.5057
        }
        PROPELLANT
        {
            name = Helium
            ratio = 12.9
            ignoreForIsp = true
        }

        !atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 280
            key = 1 100
            key = 4 0.001
        }
    }
}


