@PART[rn_atlasii_me]:BEFORE[ROWaterfall]:NEEDS[Waterfall]
{
    ROWaterfall
    {
        template = waterfall-kerolox-lower-1
        audio = pump-fed-heavy-1
		transform = thrustTransform
        position = 0,0,-0.025
        rotation = 0,0,0
        scale = 2.7, 2.7, 2.7
		
		ExtraTemplate
		{
			template = waterfall-nozzle-glow-yellow-1
			transform = thrustTransform
			position = 0,0,-0.025
			rotation = 0,0,0
			scale = 1.09, 1.09, 2.3
		}
    }
}

