    //I should not have put this many configs and subconfigs in one engine...
    @MODULE[ModuleEngineConfigs]:NEEDS[B9PartSwitch]
    {
        @CONFIG[LR87-AJ-1]
        {
            %rowaterfallVariant = kerolox8AR
            @SUBCONFIG,*
            {
                LinkB9PSModule
                {
                    name = rowaterfallMainPlumeSwitch
                    subtype = kerolox25AR
                }
            }
        }
        @CONFIG[LR87-AJ-3]
        {
            %rowaterfallVariant = kerolox8AR
            @SUBCONFIG,*
            {
                LinkB9PSModule
                {
                    name = rowaterfallMainPlumeSwitch
                    subtype = kerolox25AR
                }
            }
        }
        @CONFIG[LR87-AJ-?],*
        {
            &rowaterfallVariant = hypergolic8ARLong
            @SUBCONFIG[15AR]
            {
                LinkB9PSModule
                {
                    name = rowaterfallMainPlumeSwitch
                    subtype = hypergolic15AR
                }
            }
            @SUBCONFIG[49AR]
            {
                LinkB9PSModule
                {
                    name = rowaterfallMainPlumeSwitch
                    subtype = hypergolic49AR
                }
            }
        }
        @CONFIG[LR87-AJ-?-K*],*
        {
            %rowaterfallVariant = kerolox8ARLong
            @SUBCONFIG[15AR]
            {
                LinkB9PSModule
                {
                    name = rowaterfallMainPlumeSwitch
                    subtype = kerolox15AR
                }
            }
            @SUBCONFIG[49AR]
            {
                LinkB9PSModule
                {
                    name = rowaterfallMainPlumeSwitch
                    subtype = kerolox49AR
                }
            }
        }
        @CONFIG[LR87-AJ-11*K*],*
        {
            %rowaterfallVariant = kerolox15AR
            @SUBCONFIG[8AR]
            {
                LinkB9PSModule
                {
                    name = rowaterfallMainPlumeSwitch
                    subtype = kerolox8ARLong
                }
            }
            @SUBCONFIG[12AR]
            {
                LinkB9PSModule
                {
                    name = rowaterfallMainPlumeSwitch
                    subtype = kerolox15AR
                }
            }
            @SUBCONFIG[49AR]
            {
                LinkB9PSModule
                {
                    name = rowaterfallMainPlumeSwitch
                    subtype = kerolox49AR
                }
            }
        }
        @CONFIG[LR87-AJ-1?*],*
        {
            &rowaterfallVariant = hypergolic15AR
            @SUBCONFIG[8AR]
            {
                &LinkB9PSModule[rowaterfallMainPlumeSwitch]
                {
                    subtype = hypergolic8ARLong
                }
            }
            @SUBCONFIG[12AR]
            {
                &LinkB9PSModule[rowaterfallMainPlumeSwitch]
                {
                    subtype = hypergolic15AR
                }
            }
            @SUBCONFIG[49AR]
            {
                &LinkB9PSModule[rowaterfallMainPlumeSwitch]
                {
                    subtype = hypergolic49AR
                }
            }
        }
    }
}

